<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymPro Ultimate - 27 Estaciones</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #e67e22; --primary-dark: #d35400;
            --success: #27ae60; --warning: #f1c40f; --danger: #e74c3c;
            --bg: #fff5ed; --card-bg: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 50px; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        h1 { text-align: center; color: var(--primary-dark); display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* Tarjetas y Botones */
        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 12px rgba(230, 126, 34, 0.1); border: 1px solid rgba(230, 126, 34, 0.1); }
        .btn-main { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 600; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; cursor: pointer; }
        .btn-outline { background: white; border: 1px solid #eee; padding: 12px; border-radius: 10px; width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-size: 14px; color: #555; }
        
        /* Selector Días */
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 15px; }
        .day-btn { padding: 12px 2px; font-size: 10px; background: white; border: 1px solid #eee; border-radius: 10px; cursor: pointer; font-weight: bold; color: var(--primary-dark); }
        .day-btn.active { background: var(--primary); color: white; }
        .day-btn.rest { color: #aaa; background: #fafafa; }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; overflow-y: auto; z-index: 1000; padding: 10px; }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; }
        .modal-content { background: white; border-radius: 20px; padding: 25px; width: 100%; max-width: 500px; margin-top: 20px; position: relative; border-top: 6px solid var(--primary); }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #999; }
        
        .info-section { margin-top: 15px; padding: 15px; border-radius: 10px; background: #fefefe; border: 1px solid #eee; }
        .setup-box { background: #fffbe6; border: 1px solid #ffe58f; }
        .weight-box { background: #f0fff4; border: 1px solid #c6f6d5; }
        .setup-input { width: 100%; border: none; background: transparent; font-size: 16px; font-weight: bold; color: #856404; outline: none; border-bottom: 1px dashed #ffe58f; }
        .modal-img { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid #eee; }
        
        #searchBar { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 10px; box-sizing: border-box; }
        .muscle-header { background: #fff0e0; padding: 8px 12px; border-radius: 8px; color: var(--primary-dark); font-weight: 800; margin-top: 15px; font-size: 11px; text-transform: uppercase; border-left: 5px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="material-icons">bolt</i> Mi Gym Pro</h1>

    <section class="card">
        <div class="days-grid">
            <button class="day-btn" onclick="showDay('Lunes', this)">LUN</button>
            <button class="day-btn" onclick="showDay('Martes', this)">MAR</button>
            <button class="day-btn" onclick="showDay('Miercoles', this)">MIE</button>
            <button class="day-btn rest" onclick="showDay('Jueves', this)">JUE</button>
            <button class="day-btn" onclick="showDay('Viernes', this)">VIE</button>
            <button class="day-btn" onclick="showDay('Sabado', this)">SAB</button>
            <button class="day-btn rest" onclick="showDay('Domingo', this)">DOM</button>
        </div>
        <div id="routineList"></div>
    </section>

    <section class="card">
        <h2><i class="material-icons">search</i> Buscador de Máquinas</h2>
        <input type="text" id="searchBar" placeholder="Ej: Prensa, Jalón, Bíceps..." onkeyup="filterMachines()">
        <div id="allMachinesList"></div>
    </section>
</div>

<div class="modal" id="exerciseModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modalSciatica"></div>
        <h2 id="modalTitle"></h2>
        <p id="modalMuscles" style="color:var(--primary); font-weight:bold; margin-top:0;"></p>

        <div class="info-section setup-box">
            <strong style="font-size:10px; color:#856404;">MI SETUP (ASIENTO/REGLAJE)</strong>
            <input type="text" id="setupInput" class="setup-input" onchange="saveData('setup')">
        </div>

        <div class="info-section weight-box">
            <strong style="font-size:10px; color:#27ae60;">MI PESO MÁXIMO (KG)</strong>
            <div style="display:flex; align-items:center; gap:10px; margin-top:5px;">
                <input type="number" id="weightInput" style="width:80px; padding:10px; border-radius:8px; border:1px solid #ccc; font-weight:bold;" onchange="saveData('weight')">
                <strong>kg</strong>
            </div>
        </div>

        <div class="info-section" style="background:#f0f5ff;">
            <strong style="color:#2b6cb0; font-size:11px;">PLAN B (SI ESTÁ OCUPADA)</strong>
            <p id="modalPlanB" style="margin:5px 0; font-weight:bold;"></p>
        </div>

        <div id="modalVideo" style="margin-top:15px;"></div>

        <div class="info-section">
            <strong>📋 Guía Visual</strong>
            <p style="font-size:12px; margin-bottom:5px;">Músculos implicados:</p>
            <img id="imgTable" class="modal-img">
            <p style="font-size:12px; margin:10px 0 5px 0;">Máquina en el Gym:</p>
            <img id="imgPhoto" class="modal-img">
        </div>
        
        <button class="btn-main" onclick="closeModal()" style="margin-top:20px; justify-content:center;">CERRAR</button>
    </div>
</div>

<script>
const machines = [
    { id: "1", nombre: "Press de Pecho Convergente", grupo: "Pecho", tags: ["Miercoles", "Sabado"], planB: "Pec Fly", sciatica: "green" },
    { id: "2", nombre: "Apertura Pec Fly", grupo: "Pecho", tags: ["Miercoles"], planB: "Press de Pecho", sciatica: "green" },
    { id: "3", nombre: "Vertical Chest Press", grupo: "Pecho", tags: ["Miercoles"], planB: "Press Convergente", sciatica: "green" },
    { id: "4", nombre: "Remo Sentado (A/B/C)", grupo: "Espalda", tags: ["Martes", "Sabado"], planB: "Polea baja triángulo", sciatica: "green" },
    { id: "5", nombre: "Jalón al Pecho", grupo: "Espalda", tags: ["Martes", "Sabado"], planB: "Dominadas asistidas", sciatica: "green" },
    { id: "6", nombre: "Dominadas Asistidas", grupo: "Espalda", tags: ["Martes"], planB: "Jalón al pecho", sciatica: "green" },
    { id: "7", nombre: "Extensión Lumbar Placas", grupo: "Espalda", tags: ["Martes", "Sabado"], planB: "Banco extensiones", sciatica: "yellow" },
    { id: "8", nombre: "Press Hombro Convergente", grupo: "Hombro", tags: ["Miercoles", "Sabado"], planB: "Press de Hombro (otra)", sciatica: "green" },
    { id: "9", nombre: "Press de Hombro (Estación)", grupo: "Hombro", tags: ["Miercoles"], planB: "Press Convergente", sciatica: "green" },
    { id: "10", nombre: "Deltoides Posterior Reverse Fly", grupo: "Hombro", tags: ["Miercoles", "Sabado"], planB: "Remo codos altos", sciatica: "green" },
    { id: "11", nombre: "Curl de Bíceps (A/B)", grupo: "Brazos", tags: ["Martes", "Sabado"], planB: "Polea baja barra", sciatica: "green" },
    { id: "12", nombre: "Press Tríceps Sentado", grupo: "Brazos", tags: ["Miercoles", "Sabado"], planB: "Polea alta tríceps", sciatica: "green" },
    { id: "13", nombre: "Prensa Inclinada 45°", grupo: "Pierna", tags: ["Lunes", "Viernes", "Sabado"], planB: "Prensa horizontal", sciatica: "yellow", imgTable: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj-QKH1W9BAoXhY2vcmoTHCQyDBCvUdlTzAwasDaqptWnF6swPXTg3xijeTuxBn_KRjiR0Wq0GE7Ew8XCDuLYHxtCD0jZ4TQMaodPeDQDfidHGBFTEESNeHlEtepIihq0ecZwcVreOtWur3ANPvYmWRu8q2joftjLxVDMagm_fmmzHn8tSZ3IaTXZiIFS0/s16000/parto45.png" },
    { id: "14", nombre: "Prensa Horizontal", grupo: "Pierna", tags: ["Lunes", "Viernes"], planB: "Prensa inclinada", sciatica: "green" },
    { id: "15", nombre: "Extensión de Cuádriceps", grupo: "Pierna", tags: ["Lunes", "Viernes"], planB: "Prensa pies bajos", sciatica: "green" },
    { id: "16", nombre: "Flexión Pierna Acostado", grupo: "Pierna", tags: ["Lunes", "Viernes"], planB: "Flexión sentado", sciatica: "green" },
    { id: "17", nombre: "Flexión Pierna Sentado", grupo: "Pierna", tags: ["Lunes", "Viernes"], planB: "Flexión acostado", sciatica: "green" },
    { id: "18", nombre: "Hip Thrust Placas (Matrix)", grupo: "Pierna", tags: ["Lunes", "Viernes", "Sabado"], planB: "Prensa pies altos", sciatica: "green" },
    { id: "19", nombre: "Abductor (Estación)", grupo: "Pierna", tags: ["Lunes", "Viernes"], planB: "Polea baja glúteo", sciatica: "green" },
    { id: "20", nombre: "Adductor (Estación)", grupo: "Pierna", tags: ["Lunes", "Viernes"], planB: "Gomas / Polea", sciatica: "green" },
    { id: "21", nombre: "Gemelo Sentado", grupo: "Pierna", tags: ["Lunes", "Viernes", "Sabado"], planB: "Puntas en prensa", sciatica: "green" },
    { id: "22", nombre: "Crunch Abdominal", grupo: "Core", tags: ["Lunes", "Miercoles", "Viernes", "Sabado"], planB: "Plancha", sciatica: "green" },
    { id: "23", nombre: "Extensión Espalda (Core)", grupo: "Core", tags: ["Martes", "Sabado"], planB: "Peso muerto rumano", sciatica: "yellow" },
    { id: "24", nombre: "Smith Machine", grupo: "Multiuso", tags: ["Sabado"], planB: "Mancuernas", sciatica: "yellow" },
    { id: "25", nombre: "Decline Bench Press", grupo: "Pecho", tags: ["Miercoles"], planB: "Press Smith", sciatica: "green" },
    { id: "26", nombre: "Poleas y Accesorios", grupo: "Multiuso", tags: ["Martes", "Sabado"], planB: "-", sciatica: "green" },
    { id: "27", nombre: "Gemelo de pie", grupo: "Pierna", tags: ["Lunes", "Viernes"], planB: "Gemelo sentado", sciatica: "green" }
];

let currentId = null;

function showDay(day, btn) {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    const container = document.getElementById('routineList');
    
    if(day === 'Jueves' || day === 'Domingo') {
        container.innerHTML = `<div style="text-align:center; padding:30px; color:#999;"><i class="material-icons" style="font-size:48px;">spa</i><br>DESCANSO</div>`;
        return;
    }

    const filtrados = machines.filter(m => m.tags.includes(day));
    let html = `<h3>Plan: ${day}</h3>`;
    const grupos = [...new Set(filtrados.map(m => m.grupo))];
    
    grupos.forEach(g => {
        html += `<div class="muscle-header">${g}</div>`;
        filtrados.filter(m => m.grupo === g).forEach(m => {
            html += `<button class="btn-main" onclick="openModal('${m.id}')"><span>${m.nombre}</span><i class="material-icons">chevron_right</i></button>`;
        });
    });
    container.innerHTML = html;
}

function openModal(id) {
    const m = machines.find(x => x.id === id);
    currentId = id;
    document.getElementById('modalTitle').innerText = m.nombre;
    document.getElementById('modalMuscles').innerText = m.grupo;
    document.getElementById('modalPlanB').innerText = m.planB;
    
    document.getElementById('setupInput').value = localStorage.getItem('setup_'+id) || "";
    document.getElementById('weightInput').value = localStorage.getItem('weight_'+id) || "";

    const sci = document.getElementById('modalSciatica');
    sci.innerHTML = m.sciatica === 'green' ? 
        `<span style="background:var(--success); color:white; padding:4px 10px; border-radius:10px; font-size:10px;">OK CIÁTICA</span>` : 
        `<span style="background:var(--warning); color:black; padding:4px 10px; border-radius:10px; font-size:10px;">CUIDADO CIÁTICA</span>`;

    document.getElementById('imgTable').src = m.imgTable || "https://via.placeholder.com/400x200?text=Imagen+Musculos";
    document.getElementById('imgPhoto').src = m.imgPhoto || "https://via.placeholder.com/400x200?text=Foto+Gym";

    document.getElementById('exerciseModal').classList.add('active');
    document.body.style.overflow = "hidden";
}

function saveData(type) {
    const val = type === 'setup' ? document.getElementById('setupInput').value : document.getElementById('weightInput').value;
    localStorage.setItem(type + '_' + currentId, val);
}

function filterMachines() {
    const q = document.getElementById('searchBar').value.toLowerCase();
    const f = machines.filter(m => m.nombre.toLowerCase().includes(q) || m.grupo.toLowerCase().includes(q));
    document.getElementById('allMachinesList').innerHTML = f.map(m => `<div class="btn-outline" onclick="openModal('${m.id}')"><span>${m.nombre}</span><i class="material-icons">info</i></div>`).join('');
}

function closeModal() { document.getElementById('exerciseModal').classList.remove('active'); document.body.style.overflow = "auto"; }

showDay('Lunes', document.querySelector('.day-btn'));
filterMachines();
</script>
</body>
</html>
