<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Gym Pro - Orange Edition</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #e67e22; 
            --primary-dark: #d35400; 
            --accent: #f39c12; 
            --success: #27ae60;
            --warning: #f1c40f;
            --danger: #e74c3c;
            --bg: #fff5ed; 
            --card-bg: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 50px; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        
        h1, h2 { text-align: center; color: var(--primary-dark); display: flex; align-items: center; justify-content: center; gap: 10px; }

        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 12px rgba(230, 126, 34, 0.1); border: 1px solid rgba(230, 126, 34, 0.1); }
        
        .badge-sciatica { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; color: white; margin-bottom: 10px; }
        .bg-green { background-color: var(--success); }
        .bg-yellow { background-color: var(--warning); color: #000; }
        .bg-red { background-color: var(--danger); }

        .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 8px; text-align: center; text-decoration: none; box-sizing: border-box; font-weight: 600; }
        .btn-main { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: 0 4px 6px rgba(211, 84, 0, 0.2); }
        .btn-outline { border: 1px solid #ddd; color: var(--primary-dark); background: white; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        
        .days-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(75px, 1fr)); gap: 8px; margin-bottom: 20px; }
        .day-btn { padding: 12px 5px; font-size: 12px; background: white; border: 1px solid #eee; border-radius: 10px; cursor: pointer; font-weight: bold; color: var(--primary-dark); }
        .day-btn.active { background: var(--primary); color: white; border-color: var(--primary-dark); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; overflow-y: auto; z-index: 1000; padding: 10px; }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; }
        .modal-content { background: white; border-radius: 20px; padding: 25px; width: 100%; max-width: 500px; margin-top: 20px; position: relative; border-top: 6px solid var(--primary); }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #999; }

        .modal-img { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid #eee; background: #fafafa; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; margin: 15px 0; background: #000; border-radius: 12px; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .info-section { margin-top: 20px; padding: 15px; border-radius: 10px; background: #fefefe; border: 1px solid #eee; }
        .info-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        .info-table td { padding: 8px; border-bottom: 1px solid #eee; }
        
        .progress-box { background: #fff8f0; padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid #ffe0bd; }
        .progress-box input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; font-weight: bold; margin-bottom: 10px; box-sizing: border-box; }

        .planb-section { margin-top: 15px; padding: 12px; border-radius: 10px; background: #eef2ff; border: 1px solid #c7d2fe; color: #3730a3; }
        .badge-snc { font-size: 10px; background: #ffeaa7; padding: 2px 6px; border-radius: 4px; color: #d35400; margin-left: 8px; font-weight: bold; }

        #searchBar { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; outline: none; }
        .muscle-header { background: #fff0e0; padding: 8px 12px; border-radius: 8px; color: var(--primary-dark); font-weight: 800; margin-top: 20px; font-size: 13px; text-transform: uppercase; border-left: 5px solid var(--primary); letter-spacing: 1px; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="material-icons">fitness_center</i> Mi Gym Pro</h1>
    <section class="card">
        <div class="days-grid">
            <button class="day-btn" onclick="showDay('Lunes', this)">LUN</button>
            <button class="day-btn" onclick="showDay('Martes', this)">MAR</button>
            <button class="day-btn" onclick="showDay('Miercoles', this)">MIE</button>
            <button class="day-btn" onclick="showDay('Jueves', this)">JUE</button>
            <button class="day-btn" onclick="showDay('Viernes', this)">VIE</button>
            <button class="day-btn" onclick="showDay('Sabado', this)">SAB</button>
            <button class="day-btn" onclick="showDay('Domingo', this)">DOM</button>
        </div>
        <div id="routineList"><p style="text-align:center; color:#999; padding: 20px;">Toca un día para entrenar.</p></div>
    </section>
    <section class="card">
        <h2><i class="material-icons">search</i> Buscador</h2>
        <input type="text" id="searchBar" placeholder="Ej: Prensa, Pecho, Bíceps..." onkeyup="filterMachines()">
        <div id="allMachinesList"></div>
    </section>
</div>

<div class="modal" id="exerciseModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modalSciatica"></div>
        <h2 id="modalTitle"></h2>
        <p id="modalMuscles" style="color:var(--primary); font-weight:bold; margin-top:0;"></p>
        <div class="planb-section" id="sectionPlanB" style="display:none;">
            <strong>PLAN B:</strong> <span id="modalPlanB"></span>
        </div>
        <div class="video-container" id="modalVideo"></div>
        <div class="progress-box">
            <strong>Setup:</strong>
            <input type="text" id="setupInput" placeholder="Ej: Altura 5">
            <strong>Peso:</strong>
            <input type="number" id="weightInput" placeholder="0">
            <button class="btn btn-main" onclick="saveData()">Guardar Progreso</button>
        </div>
        <div class="info-section" id="sectionSteps" style="display:none;">
            <strong>Instrucciones:</strong>
            <table class="info-table" id="stepsTableContent"></table>
        </div>
        <h3 style="border-bottom: 2px solid #eee;">Identificación</h3>
        <p>Anatomía:</p>
        <img id="imgTable" class="modal-img">
        <p>Máquina:</p>
        <img id="imgPhoto" class="modal-img">
        <button class="btn btn-main" onclick="closeModal()" style="margin-top:20px;">Volver</button>
    </div>
</div>
<script>
/**
 * BASE DE DATOS DE MÁQUINAS (27 TOTAL)
 * snc: 4 (Alta fatiga/Inicio) -> 1 (Baja fatiga/Final)
 */
const machines = [
{ 
        id: "press_convergente", nombre: "1. Press de Pecho Convergente", grupo: "Pecho", sciatica: "green", snc: 3, planB: "Pec Fly",
        tags: ["Miercoles", "Sabado"], 
        pasos: [["1. Ajuste", "Altura del asiento para que los agarres queden al nivel del pectoral medio."], ["2. Empuje", "Extiende los brazos sin bloquear los codos al final."], ["3. Retorno", "Baja lento sintiendo el estiramiento."]],
        errores: [["Despegar espalda", "Mantén las escápulas retraídas contra el banco."], ["Codos muy altos", "Alinea los codos ligeramente por debajo de los hombros."]],
        nota: "Ideal para masa pectoral con máxima seguridad axial."
    },
    { 
        id: "pec_fly", nombre: "2. Apertura de Pectoral Pec Fly", grupo: "Pecho", sciatica: "green", snc: 2, planB: "Press de Pecho",
        tags: ["Miercoles", "Sabado"], 
        pasos: [["1. Posición", "Brazos casi extendidos, ligera flexión de codo."], ["2. Cierre", "Junta los agarres apretando el centro del pecho."], ["3. Apertura", "Controla la fase excéntrica hasta notar estiramiento."]],
        errores: [["Exceso de peso", "Es un ejercicio de aislamiento, no de fuerza bruta."], ["Hombros adelante", "Saca pecho durante todo el recorrido."]]
    },
    { 
        id: "vertical_chest", nombre: "3. Vertical Chest Press", grupo: "Pecho", sciatica: "green", snc: 3, planB: "Press Convergente",
        tags: ["Miercoles"], 
        pasos: [["1. Agarre", "Sujeta las asas firmemente con las muñecas rectas."], ["2. Ejecución", "Empuja frontalmente manteniendo el control abdominal."]],
        errores: [["Muñecas dobladas", "Mantén la línea del antebrazo."], ["Asiento bajo", "Evita que los hombros suban hacia las orejas."]]
    },
    { 
        id: "remo_sentado", nombre: "4. Remo Sentado (Unificado)", grupo: "Espalda", sciatica: "yellow", snc: 3, planB: "Polea baja con triángulo",
        tags: ["Martes", "Sabado"], 
        pasos: [["1. Apoyo", "Pies firmes en los soportes, rodillas semiflexionadas."], ["2. Tracción", "Lleva el agarre hacia el ombligo, no hacia el pecho."], ["3. Extensión", "No dejes que el peso tire de tu tronco hacia adelante."]],
        errores: [["Balanceo", "No uses la inercia del cuerpo para tirar."], ["Encorvarse", "Mantén la columna neutra para proteger la ciática."]]
    },
    { 
        id: "jalon_pecho", nombre: "5. Jalón al Pecho (Lat Pulldown)", grupo: "Espalda", sciatica: "green", snc: 3, planB: "Dominadas asistidas",
        tags: ["Martes", "Sabado"], 
        pasos: [["1. Agarre", "Más ancho que los hombros."], ["2. Tirón", "Lleva la barra hacia la parte superior del pecho."], ["3. Control", "Sube el peso de forma pausada."]],
        errores: [["Tirar con bíceps", "Imagina que tiras con los codos."], ["Inclinarte demasiado", "Mantén el torso ligeramente inclinado, no tumbado."]]
    },
    { id: "dominadas_asist", nombre: "6. Dominadas Asistidas", grupo: "Espalda", sciatica: "green", snc: 3, planB: "Jalón al Pecho", tags: ["Martes"] },
    { id: "ext_lumbar_placas", nombre: "7. Extensión Lumbar de Placas", grupo: "Core", sciatica: "yellow", snc: 2, planB: "Banco de extensiones", tags: ["Martes"], nota: "Ajusta el rodillo para que el movimiento salga de la cadera, no de la espalda baja." },
    { id: "press_hombro_conv", nombre: "8. Press de Hombro Convergente", grupo: "Hombro", sciatica: "green", snc: 3, planB: "Press de Pecho (uso alternativo)", tags: ["Miercoles", "Sabado"] },
    { id: "press_hombro_est", nombre: "9. Press de Hombro (Estación)", grupo: "Hombro", sciatica: "green", snc: 3, planB: "Press Hombro Convergente", tags: ["Miercoles"] },
    { id: "reverse_fly", nombre: "10. Deltoides Posterior Reverse Fly", grupo: "Hombro", sciatica: "green", snc: 2, planB: "Remo sentado codos altos", tags: ["Martes", "Sabado"] },
    { id: "curl_biceps", nombre: "11. Curl de Bíceps (Unificado)", grupo: "Brazos", sciatica: "green", snc: 1, planB: "Polea baja con barra", tags: ["Martes", "Sabado"] },
    { id: "press_triceps", nombre: "12. Press de Tríceps Sentado", grupo: "Brazos", sciatica: "green", snc: 1, planB: "Fondos asistidos / Polea", tags: ["Miercoles", "Sabado"] },
    { 
        id: "prensa_45", nombre: "13. Prensa Inclinada 45°", grupo: "Pierna", sciatica: "yellow", snc: 4, planB: "Prensa horizontal",
        tags: ["Lunes", "Viernes"], 
        pasos: [["1. Pies", "Colocación media para cuádriceps."], ["2. Bajada", "Lenta hasta que el lumbar amague con despegarse."], ["3. Empuje", "Fuerza desde los talones."]],
        errores: [["Bloqueo articular", "Nunca estires las rodillas al 100%."], ["Despegar glúteo", "Peligro máximo para tu ciática."]]
    },
    { id: "prensa_horizontal", nombre: "14. Prensa Horizontal de Placas", grupo: "Pierna", sciatica: "yellow", snc: 3, planB: "Prensa inclinada", tags: ["Lunes", "Viernes", "Sabado"] },{ 
        id: "ext_cuadriceps", nombre: "15. Extensión de Cuádriceps", grupo: "Pierna", sciatica: "green", snc: 2, planB: "Prensa (Pies bajos)",
        tags: ["Lunes", "Viernes"], 
        pasos: [["1. Eje", "Alinea la rodilla con el punto de giro de la máquina."], ["2. Ejecución", "Extiende totalmente y aprieta el cuádriceps 1 segundo."], ["3. Descenso", "Baja el peso de forma controlada, no lo dejes caer."]],
        errores: [["Rodillo alto", "Ajusta el rodillo justo encima del empeine."], ["Separar glúteo", "Mantente pegado al asiento usando los agarres laterales."]]
    },
    { 
        id: "flexion_acostado", nombre: "16. Flexión de Pierna Acostado", grupo: "Pierna", sciatica: "green", snc: 2, planB: "Flexión sentado",
        tags: ["Lunes", "Viernes"], 
        pasos: [["1. Posición", "Túmbate boca abajo alineando las rodillas con el eje."], ["2. Tracción", "Lleva los talones hacia el glúteo de forma explosiva."], ["3. Retorno", "Extiende las piernas lentamente resistiendo el peso."]],
        errores: [["Levantar cadera", "Mantén la pelvis pegada al banco para aislar el femoral."], ["Movimiento corto", "Realiza el rango completo de movimiento."]],
        nota: "Fundamental para la estabilidad de la rodilla y equilibrio muscular."
    },
    { id: "flexion_sentado", nombre: "17. Flexión de Pierna Sentado", grupo: "Pierna", sciatica: "green", snc: 2, planB: "Flexión acostado", tags: ["Lunes", "Viernes"] },
    { 
        id: "hip_thrust_matrix", nombre: "18. Hip Thrust de Placas (Matrix)", grupo: "Glúteo", sciatica: "green", snc: 4, planB: "Prensa (Pies altos)",
        tags: ["Lunes", "Viernes", "Sabado"], 
        pasos: [["1. Cinturón", "Ajusta el cinturón o almohadilla sobre el hueso de la cadera."], ["2. Pies", "Colócalos de modo que la rodilla forme 90º al subir."], ["3. Empuje", "Eleva la cadera apretando fuerte el glúteo en la cima."]],
        errores: [["Puntas pies", "Empuja siempre con el talón."], ["Mirar arriba", "Mantén la barbilla pegada al pecho para proteger la espalda."]],
        nota: "La máquina Matrix ofrece una tensión constante superior a la barra libre."
    },
    { id: "abductor_est", nombre: "19. Abductor (Estación)", grupo: "Glúteo", sciatica: "green", snc: 1, planB: "Otra unidad abductor", tags: ["Lunes", "Viernes", "Sabado"] },
    { id: "adductor_est", nombre: "20. Adductor (Estación)", grupo: "Pierna", sciatica: "green", snc: 1, planB: "Otra unidad adductor", tags: ["Lunes", "Viernes"] },
    { 
        id: "gemelo_sentado", nombre: "21. Gemelo Sentado", grupo: "Pierna", sciatica: "green", snc: 1, planB: "Puntas en prensa",
        tags: ["Lunes", "Viernes"], 
        pasos: [["1. Apoyo", "Coloca las almohadillas sobre los muslos, no sobre las rodillas."], ["2. Estiramiento", "Baja los talones al máximo sintiendo el sóleo."], ["3. Contracción", "Sube hasta ponerte de puntillas totalmente."]],
        errores: [["Rebote", "No uses el muelle; para 1 seg abajo y 1 seg arriba."], ["Poco peso", "El gemelo aguanta mucha carga, no tengas miedo a subir peso."]]
    },
    { 
        id: "crunch_abdominal", nombre: "22. Crunch Abdominal (Unificado)", grupo: "Core", sciatica: "green", snc: 1, planB: "Plancha frontal",
        tags: ["Lunes", "Viernes", "Sabado"], 
        pasos: [["1. Agarre", "Sujeta las asas detrás de la cabeza sin tirar del cuello."], ["2. Contracción", "Expulsa el aire mientras encoges el abdomen."], ["3. Extensión", "Vuelve atrás estirando el abdomen sin que las placas choquen."]],
        errores: [["Tirar con brazos", "La fuerza debe salir del abdomen, no de los brazos."], ["Movimiento rápido", "Hazlo lento para evitar involucrar el psoas."]]
    },
    { id: "back_extension", nombre: "23. Extensión de Espalda (Core)", grupo: "Core", sciatica: "yellow", snc: 2, planB: "Peso muerto rumano", tags: ["Martes"] },
    { 
        id: "smith_machine", nombre: "24. Smith Machine (Multiuso)", grupo: "Multiuso", sciatica: "yellow", snc: 4, planB: "Mancuernas",
        tags: ["Lunes", "Sabado"], 
        pasos: [["1. Posición", "Alinea la barra con el ejercicio elegido (Sentadilla/Press)."], ["2. Seguridad", "Asegúrate de que los topes están a la altura correcta."]],
        nota: "Usa esta máquina para ejercicios que requieran máxima estabilidad axial."
    },
    { 
        id: "decline_bench", nombre: "25. Decline Bench Press (Barra)", grupo: "Pecho", sciatica: "green", snc: 4, planB: "Press plano",
        tags: ["Miercoles", "Sabado"], 
        pasos: [["1. Fijación", "Engancha bien las piernas en los rodillos."], ["2. Barra", "Baja la barra hacia la parte baja del pectoral."], ["3. Empuje", "Sube explosivo pero controlado."]],
        errores: [["Codos abiertos", "Mantén los codos a 45º del cuerpo."], ["Rebotar barra", "No golpees el pecho con la barra."]]
    },
    { id: "poleas_acc", nombre: "26. Poleas y Accesorios", grupo: "Multiuso", sciatica: "green", snc: 2, planB: "Máquina específica", tags: ["Martes", "Miercoles", "Viernes"] },
    { id: "gemelo_pie", nombre: "27. Gemelo de Pie / Otros", grupo: "Pierna", sciatica: "green", snc: 1, planB: "Gemelo sentado", tags: ["Sabado"] }
];

/** * LOGICA DE LA APLICACIÓN
 */
const resumenDias = { "Lunes": "Piernas & Abdomen", "Martes": "Espalda & Bíceps", "Miercoles": "Pecho, Hombro & Tríceps", "Jueves": "Descanso", "Viernes": "Piernas & Abdomen", "Sabado": "Full Body (Fuerza)", "Domingo": "Libre" };
let currentId = "";

function showDay(day, btn) {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const container = document.getElementById('routineList');
    
    if(day === 'Jueves' || day === 'Domingo') {
        container.innerHTML = `<div style="text-align:center; padding:40px; color:var(--primary-dark);"><i class="material-icons" style="font-size:50px;">spa</i><br><strong>DESCANSO / RECUPERACIÓN</strong></div>`;
        return;
    }

    // ORDENACIÓN POR FATIGA SNC (4 más pesado, 1 más ligero)
    const filtrados = machines
        .filter(m => m.tags?.includes(day))
        .sort((a, b) => (b.snc || 1) - (a.snc || 1));

    let html = `<div style="margin-bottom:15px; border-left:4px solid var(--primary); padding-left:15px;"><small>Enfoque hoy:</small><br><strong>${resumenDias[day]}</strong></div>`;
    
    const grupos = [...new Set(filtrados.map(m => m.grupo))];
    grupos.forEach(g => {
        html += `<div class="muscle-header">${g}</div>`;
        filtrados.filter(m => m.grupo === g).forEach(m => {
            html += `<button class="btn btn-main" onclick="openModal('${m.id}')" style="text-align:left; display:flex; justify-content:space-between; align-items:center;">
                <span>${m.nombre}</span>
                <span class="badge-snc">F${m.snc || 1}</span>
            </button>`;
        });
    });
    container.innerHTML = html;
}

function openModal(id) {
    const m = machines.find(x => x.id === id);
    if(!m) return;
    currentId = id;
    document.getElementById('modalTitle').innerText = m.nombre;
    document.getElementById('modalMuscles').innerText = m.grupo;
    document.getElementById('imgTable').src = m.imgTable || "";
    document.getElementById('imgPhoto').src = m.imgPhoto || "";
    document.getElementById('setupInput').value = localStorage.getItem('setup_'+id) || "";
    document.getElementById('weightInput').value = localStorage.getItem('weight_'+id) || "";

    const pB = document.getElementById('sectionPlanB');
    if(m.planB) { pB.style.display = 'block'; document.getElementById('modalPlanB').innerText = m.planB; } else { pB.style.display = 'none'; }

    const vC = document.getElementById('modalVideo');
    vC.innerHTML = m.video ? `<iframe src="${m.video}" frameborder="0" allowfullscreen></iframe>` : "";

    const sT = document.getElementById('sectionSteps');
    if(m.pasos) {
        sT.style.display = 'block';
        document.getElementById('stepsTableContent').innerHTML = m.pasos.map(p => `<tr><td><strong>${p[0]}</strong></td><td>${p[1]}</td></tr>`).join('');
    } else { sT.style.display = 'none'; }

    const sci = document.getElementById('modalSciatica');
    const sData = { green: ['bg-green', 'OK CIÁTICA'], yellow: ['bg-yellow', 'CUIDADO'], red: ['bg-red', 'RIESGO'] }[m.sciatica] || ['bg-green', 'OK'];
    sci.innerHTML = `<span class="badge-sciatica ${sData[0]}">${sData[1]}</span>`;

    document.getElementById('exerciseModal').classList.add('active');
}

function saveData() {
    localStorage.setItem('setup_' + currentId, document.getElementById('setupInput').value);
    localStorage.setItem('weight_' + currentId, document.getElementById('weightInput').value);
    alert("¡Datos guardados para la próxima sesión!");
}

function closeModal() { 
    document.getElementById('exerciseModal').classList.remove('active'); 
    document.getElementById('modalVideo').innerHTML = ""; 
}

function filterMachines() {
    const q = document.getElementById('searchBar').value.toLowerCase();
    const f = machines.filter(m => m.nombre.toLowerCase().includes(q) || m.grupo.toLowerCase().includes(q));
    document.getElementById('allMachinesList').innerHTML = f.map(m => `<div class="btn btn-outline" onclick="openModal('${m.id}')"><span><strong>${m.nombre}</strong></span><i class="material-icons" style="color:var(--primary);">info</i></div>`).join('');
}
filterMachines();
</script>
</body>
</html>
