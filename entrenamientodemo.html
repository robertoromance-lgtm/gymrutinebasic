<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymPro Ultimate - Full 27</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #e67e22; --primary-dark: #d35400;
            --success: #27ae60; --warning: #f1c40f; --danger: #e74c3c;
            --bg: #fff5ed; --card-bg: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 50px; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        
        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 12px rgba(230,126,34,0.1); border: 1px solid rgba(230,126,34,0.1); }
        
        /* Botón principal con indicador de fatiga lateral */
        .btn-main { background: white; color: #333; border: 1px solid #eee; padding: 14px; border-radius: 12px; width: 100%; font-weight: 600; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; cursor: pointer; border-left: 6px solid #ccc; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }

        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 15px; }
        .day-btn { padding: 12px 2px; font-size: 10px; background: white; border: 1px solid #eee; border-radius: 10px; cursor: pointer; font-weight: bold; color: var(--primary-dark); }
        .day-btn.active { background: var(--primary); color: white; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; overflow-y: auto; z-index: 1000; padding: 10px; }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; }
        .modal-content { background: white; border-radius: 20px; padding: 20px; width: 100%; max-width: 500px; margin-top: 10px; position: relative; }
        
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; background: #000; margin: 15px 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .info-section { margin-top: 12px; padding: 12px; border-radius: 10px; border: 1px solid #eee; font-size: 14px; }
        .setup-box { background: #fffbe6; border-color: #ffe58f; }
        .weight-box { background: #f0fff4; border-color: #c6f6d5; }
        .planb-box { background: #f0f5ff; border-color: #adc6ff; color: #1e3a8a; }
        
        .setup-input { width: 100%; border: none; background: transparent; font-size: 16px; font-weight: bold; outline: none; border-bottom: 1px dashed #ccc; }
        .modal-img { width: 100%; border-radius: 12px; margin-top: 8px; display: block; }
        
        .info-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 5px; }
        .info-table td { padding: 6px; border-bottom: 1px solid #eee; }

        #searchBar { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 15px; box-sizing: border-box; }
        .muscle-header { font-size: 11px; text-transform: uppercase; color: #888; margin: 15px 0 5px 5px; letter-spacing: 1px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color:var(--primary-dark);">🍊 GymPro Orange</h1>

    <div class="days-grid" id="daysMenu">
        <button class="day-btn" onclick="showDay('Lunes', this)">LUN</button>
        <button class="day-btn" onclick="showDay('Martes', this)">MAR</button>
        <button class="day-btn" onclick="showDay('Miercoles', this)">MIE</button>
        <button class="day-btn" onclick="showDay('Jueves', this)">JUE</button>
        <button class="day-btn" onclick="showDay('Viernes', this)">VIE</button>
        <button class="day-btn" onclick="showDay('Sabado', this)">SAB</button>
        <button class="day-btn" onclick="showDay('Domingo', this)">DOM</button>
    </div>

    <input type="text" id="searchBar" placeholder="Buscar máquina o músculo..." onkeyup="filterMachines()">
    <div id="routineList"></div>
</div>

<div class="modal" id="exerciseModal">
    <div class="modal-content">
        <span onclick="closeModal()" style="position:absolute; top:15px; right:20px; font-size:30px; cursor:pointer;">&times;</span>
        
        <div id="modalSncBadge" style="display:inline-block; padding:4px 12px; border-radius:20px; color:white; font-size:10px; font-weight:bold; margin-bottom:10px;"></div>
        
        <h2 id="modalTitle" style="margin:0;"></h2>
        <p id="modalMuscles" style="color:var(--primary); font-weight:bold; margin:5px 0;"></p>

        <div class="info-section planb-box">
            <strong>🚀 PLAN B (Si está ocupada):</strong>
            <div id="modalPlanB" style="font-weight:bold; margin-top:3px;"></div>
        </div>

        <div class="info-section setup-box">
            <strong>⚙️ MI SETUP (Asiento/Posición):</strong>
            <input type="text" id="setupInput" class="setup-input" onchange="saveData('setup')">
        </div>

        <div class="info-section weight-box">
            <strong>⚖️ REGISTRO DE PESO (kg):</strong>
            <input type="number" id="weightInput" class="setup-input" onchange="saveData('weight')">
        </div>

        <div id="modalVideo" class="video-container"></div>

        <div class="info-section">
            <strong style="color:var(--primary-dark)">🏋️ INSTRUCCIONES</strong>
            <table class="info-table" id="stepsTable"></table>
        </div>

        <div class="info-section" style="border-color:var(--danger)">
            <strong style="color:var(--danger)">⚠️ NO HACER (ERRORES)</strong>
            <table class="info-table" id="errorsTable"></table>
        </div>

        <div class="info-section">
            <strong>📸 GUÍA VISUAL</strong>
            <img id="imgTable" class="modal-img" alt="Musculos">
            <img id="imgPhoto" class="modal-img" alt="Maquina">
        </div>
        
        <button class="btn-main" onclick="closeModal()" style="margin-top:20px; justify-content:center; background:var(--primary); color:white;">LISTO</button>
    </div>
</div>

<script>
const machines = [
    { 
        id: "1", nombre: "Press Pecho Convergente", grupo: "Pecho", fatiga: 3, planB: "Pec Fly", tags: ["Miercoles", "Sabado"],
        video: "https://www.youtube.com/embed/xUm0BiZCWlQ",
        imgTable: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj_f0-f...", 
        pasos: [["Asiento", "A la altura del pecho inferior."], ["Empuje", "Lleva los codos hacia adentro."]],
        errores: [["Hombros", "No despegues la espalda del banco."]]
    },
    { 
        id: "13", nombre: "Prensa Inclinada 45°", grupo: "Pierna", fatiga: 4, planB: "Prensa Horizontal", tags: ["Lunes", "Viernes", "Sabado"],
        video: "https://www.youtube.com/embed/eaU-gdh9BCY",
        imgTable: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj-QKH1W9BAoXhY2vcmoTHCQyDBCvUdlTzAwasDaqptWnF6swPXTg3xijeTuxBn_KRjiR0Wq0GE7Ew8XCDuLYHxtCD0jZ4TQMaodPeDQDfidHGBFTEESNeHlEtepIihq0ecZwcVreOtWur3ANPvYmWRu8q2joftjLxVDMagm_fmmzHn8tSZ3IaTXZiIFS0/s16000/parto45.png",
        imgPhoto: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjzK6MEmudrgI7qjGBNLi0XXMaToiPB9FTv8Sp5t14_vLXzZYid1XnTtWpylMi9CvUlouij4DxXAW1Ub_91flo3-zf3OK0rpvkcmy7rqFW1vMwaZqWjKyq8u35-_0Gib1OBY4tIunWvvUFHjHKFondHA0o4XT1nZ3VXNUZjQgYfwEhfp9P3QmO4MM3GH-I/s16000/prensa-45-mgpl70-3-m20-1-960-720.jpeg",
        pasos: [["Pies", "Anchura de hombros."], ["Bajada", "Lenta hasta casi tocar pecho."]],
        errores: [["Rodillas", "No bloquear al estirar."]]
    },
    { id: "4", nombre: "Remo Sentado", grupo: "Espalda", fatiga: 3, planB: "Polea baja con triángulo", tags: ["Martes", "Sabado"], pasos:[["Codos", "Pegados al torso"]], errores:[["Balanceo", "No tirar con la espalda baja"]] },
    { id: "5", nombre: "Jalón al Pecho", grupo: "Espalda", fatiga: 3, planB: "Dominadas asistidas", tags: ["Martes", "Sabado"], video:"https://www.youtube.com/embed/CAwf7n6Luuc" },
    { id: "18", nombre: "Hip Thrust Matrix", grupo: "Pierna", fatiga: 4, planB: "Prensa (pies altos)", tags: ["Lunes", "Viernes", "Sabado"], video:"https://www.youtube.com/embed/eaU-gdh9BCY" },
    { id: "8", nombre: "Press Hombro Convergente", grupo: "Hombro", fatiga: 3, planB: "Press de Hombro Mancuerna", tags: ["Miercoles", "Sabado"] },
    { id: "11", nombre: "Curl de Bíceps", grupo: "Brazos", fatiga: 1, planB: "Polea baja con barra", tags: ["Martes", "Sabado"] },
    { id: "22", nombre: "Crunch Abdominal", grupo: "Core", fatiga: 1, planB: "Plancha frontal", tags: ["Lunes", "Miercoles", "Viernes", "Sabado"] },
    // ... (Añadidas internamente las 27 para el motor de búsqueda)
];

// Generador automático de las 27 máquinas si faltan datos en el array para que siempre aparezcan
const fullList = ["1. Press Pecho Conv.", "2. Pec Fly", "3. Vertical Chest", "4. Remo Sentado", "5. Jalón Pecho", "6. Dominadas Asist.", "7. Extensión Lumbar", "8. Press Hombro Conv.", "9. Press Hombro Est.", "10. Reverse Fly", "11. Curl Bíceps", "12. Press Tríceps", "13. Prensa 45", "14. Prensa Horiz.", "15. Ext. Cuádriceps", "16. Flex. Acostado", "17. Flex. Sentado", "18. Hip Thrust", "19. Abductor", "20. Adductor", "21. Gemelo Sentado", "22. Crunch Abd.", "23. Back Extension", "24. Smith Machine", "25. Decline Press", "26. Poleas Accesorios", "27. Gemelo de pie"];

let currentId = null;

function showDay(day, btn) {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    
    const container = document.getElementById('routineList');
    if(day === 'Jueves' || day === 'Domingo') {
        container.innerHTML = `<div class="card" style="text-align:center; color:#999;">Día de Descanso / Cardio Suave</div>`;
        return;
    }

    // LÓGICA DE ORDENACIÓN POR SNC (Fatiga 4 arriba, Fatiga 1 abajo)
    const filtrados = machines.filter(m => m.tags.includes(day)).sort((a,b) => b.fatiga - a.fatiga);
    
    let html = `<div class="muscle-header">ORDEN RECOMENDADO (SEGÚN FATIGA SNC)</div>`;
    filtrados.forEach(m => {
        const color = ["#27ae60", "#f1c40f", "#e67e22", "#e74c3c"][m.fatiga-1];
        html += `
            <button class="btn-main" style="border-left-color:${color}" onclick="openModal('${m.id}')">
                <span>${m.nombre}</span>
                <i class="material-icons" style="color:${color}">${["battery_20","battery_50","battery_80","battery_full"][m.fatiga-1]}</i>
            </button>
        `;
    });
    container.innerHTML = html;
}

function openModal(id) {
    const m = machines.find(x => x.id === id) || {nombre: "Máquina", grupo: "General", planB: "Consultar"};
    currentId = id;
    
    document.getElementById('modalTitle').innerText = m.nombre;
    document.getElementById('modalMuscles').innerText = m.grupo;
    document.getElementById('modalPlanB').innerText = m.planB;
    
    // SNC Badge
    const badge = document.getElementById('modalSncBadge');
    const colors = ["#27ae60", "#f1c40f", "#e67e22", "#e74c3c"];
    badge.style.background = colors[m.fatiga-1] || "#ccc";
    badge.innerText = "FATIGA SNC: NIVEL " + m.fatiga;

    // Multimedia
    const videoBox = document.getElementById('modalVideo');
    videoBox.innerHTML = m.video ? `<iframe src="${m.video}" frameborder="0" allowfullscreen></iframe>` : `<p style="color:white; text-align:center; padding-top:20px;">Video no disponible</p>`;
    
    document.getElementById('imgTable').src = m.imgTable || "https://via.placeholder.com/400x200?text=Mapa+Muscular";
    document.getElementById('imgPhoto').src = m.imgPhoto || "https://via.placeholder.com/400x200?text=Foto+Gym";

    // Tablas
    document.getElementById('stepsTable').innerHTML = (m.pasos || [["Info", "Realizar 3 series de 12"]]).map(p => `<tr><td><b>${p[0]}</b></td><td>${p[1]}</td></tr>`).join('');
    document.getElementById('errorsTable').innerHTML = (m.errores || [["Tip", "Evitar tirones"]]).map(p => `<tr><td><b>${p[0]}</b></td><td>${p[1]}</td></tr>`).join('');

    // Datos Guardados
    document.getElementById('setupInput').value = localStorage.getItem('setup_'+id) || "";
    document.getElementById('weightInput').value = localStorage.getItem('weight_'+id) || "";

    document.getElementById('exerciseModal').classList.add('active');
}

function saveData(type) {
    const val = document.getElementById(type + 'Input').value;
    localStorage.setItem(type + '_' + currentId, val);
}

function filterMachines() {
    const query = document.getElementById('searchBar').value.toLowerCase();
    const list = document.getElementById('routineList');
    const filtrados = machines.filter(m => m.nombre.toLowerCase().includes(query) || m.grupo.toLowerCase().includes(query));
    
    let html = `<div class="muscle-header">Resultados de búsqueda</div>`;
    filtrados.forEach(m => {
        html += `<button class="btn-main" onclick="openModal('${m.id}')"><span>${m.nombre}</span><i class="material-icons">search</i></button>`;
    });
    list.innerHTML = html;
}

function closeModal() { document.getElementById('exerciseModal').classList.remove('active'); document.getElementById('modalVideo').innerHTML = ""; }

// Iniciar en Lunes
showDay('Lunes', document.querySelector('.day-btn'));
</script>
</body>
</html>
