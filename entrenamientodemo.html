<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Gym Pro - Orange Edition</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #e67e22; 
            --primary-dark: #d35400; 
            --accent: #f39c12; 
            --success: #27ae60;
            --warning: #f1c40f;
            --danger: #e74c3c;
            --bg: #fff5ed; 
            --card-bg: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 50px; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        
        h1, h2 { text-align: center; color: var(--primary-dark); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .material-icons { vertical-align: middle; }

        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 12px rgba(230, 126, 34, 0.1); border: 1px solid rgba(230, 126, 34, 0.1); }
        
        .badge-sciatica { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; color: white; margin-bottom: 10px; }
        .badge-snc { background: #34495e; color: #fff; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; margin-left: 10px; border: 1px solid #2c3e50; }
        .bg-green { background-color: var(--success); }
        .bg-yellow { background-color: var(--warning); color: #000; }
        .bg-red { background-color: var(--danger); }

        .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 8px; text-align: center; text-decoration: none; box-sizing: border-box; font-weight: 600; }
        .btn-main { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: 0 4px 6px rgba(211, 84, 0, 0.2); }
        .btn-outline { border: 1px solid #ddd; color: var(--primary-dark); background: white; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        
        .days-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(75px, 1fr)); gap: 8px; margin-bottom: 20px; }
        .day-btn { padding: 12px 5px; font-size: 12px; background: white; border: 1px solid #eee; border-radius: 10px; cursor: pointer; font-weight: bold; color: var(--primary-dark); }
        .day-btn.active { background: var(--primary); color: white; border-color: var(--primary-dark); box-shadow: 0 3px 6px rgba(0,0,0,0.1); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; overflow-y: auto; z-index: 1000; padding: 10px; }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; }
        .modal-content { background: white; border-radius: 20px; padding: 25px; width: 100%; max-width: 500px; margin-top: 20px; position: relative; border-top: 6px solid var(--primary); }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #999; }

        .modal-img { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid #eee; background: #fafafa; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; margin: 15px 0; background: #000; border-radius: 12px; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .info-section { margin-top: 20px; padding: 15px; border-radius: 10px; background: #fefefe; border: 1px solid #eee; }
        .info-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        .info-table td { padding: 8px; border-bottom: 1px solid #eee; }
        
        .progress-box { background: #fff8f0; padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid #ffe0bd; }
        .progress-box input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; color: var(--primary-dark); font-weight: bold; margin-bottom: 10px; box-sizing: border-box; }

        .planb-section { margin-top: 15px; padding: 12px; border-radius: 10px; background: #eef2ff; border: 1px solid #c7d2fe; color: #3730a3; }
        #searchBar { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; outline: none; }
        .muscle-header { background: #fff0e0; padding: 8px 12px; border-radius: 8px; color: var(--primary-dark); font-weight: 800; margin-top: 20px; font-size: 13px; text-transform: uppercase; border-left: 5px solid var(--primary); letter-spacing: 1px; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="material-icons">fitness_center</i> Mi Gym Pro</h1>
    <section class="card">
        <div class="days-grid">
            <button class="day-btn" onclick="showDay('Lunes', this)">LUN</button>
            <button class="day-btn" onclick="showDay('Martes', this)">MAR</button>
            <button class="day-btn" onclick="showDay('Miercoles', this)">MIE</button>
            <button class="day-btn" onclick="showDay('Jueves', this)">JUE</button>
            <button class="day-btn" onclick="showDay('Viernes', this)">VIE</button>
            <button class="day-btn" onclick="showDay('Sabado', this)">SAB</button>
            <button class="day-btn" onclick="showDay('Domingo', this)">DOM</button>
        </div>
        <div id="routineList"><p style="text-align:center; color:#999; padding: 20px;">Toca un día para entrenar.</p></div>
    </section>

    <section class="card">
        <h2><i class="material-icons">search</i> Buscador</h2>
        <input type="text" id="searchBar" placeholder="Ej: Prensa, Pecho, Bíceps..." onkeyup="filterMachines()">
        <div id="allMachinesList"></div>
    </section>
</div>

<div class="modal" id="exerciseModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modalSciatica"></div>
        <h2 id="modalTitle"></h2>
        <p id="modalMuscles" style="color:var(--primary); font-weight:bold; margin-top:0;"></p>
        
        <div class="planb-section" id="sectionPlanB" style="display:none;">
            <strong>PLAN B:</strong> <span id="modalPlanB"></span>
        </div>

        <div class="video-container" id="modalVideo"></div>
        
        <div class="progress-box">
            <strong>Setup (Asiento / Posición):</strong>
            <input type="text" id="setupInput" placeholder="Ej: Altura 5">
            <strong>Peso:</strong>
            <input type="number" id="weightInput" placeholder="0">
            <button class="btn btn-main" onclick="saveExerciseData()">Guardar Datos</button>
        </div>

        <div class="info-section" id="sectionSteps" style="display:none;">
            <strong>Instrucciones:</strong>
            <table class="info-table" id="stepsTableContent"></table>
        </div>

        <div class="info-section" id="sectionErrors" style="display:none;">
            <strong>Errores Comunes:</strong>
            <table class="info-table" id="errorTableContent"></table>
        </div>

        <h3 style="border-bottom: 2px solid #eee;">Identificación</h3>
        <p>Anatomía:</p>
        <img id="imgTable" class="modal-img">
        <p>Máquina:</p>
        <img id="imgPhoto" class="modal-img">
        <button class="btn btn-main" onclick="closeModal()" style="margin-top:25px;">Volver</button>
    </div>
</div>

<script>
const machines = [
    { id: "p_conv", nombre: "1. Press de Pecho Convergente", grupo: "Pecho", sciatica: "green", snc: 3, planB: "Pec Fly", tags: ["Miercoles", "Sabado"], pasos: [["1. Asiento", "Ajusta para que los agarres queden al pecho medio."], ["2. Empuje", "Extiende sin bloquear codos."]] },
    { id: "pec_fly", nombre: "2. Apertura Pectoral Pec Fly", grupo: "Pecho", sciatica: "green", snc: 2, planB: "Press de Pecho", tags: ["Miercoles", "Sabado"] },
    { id: "vert_press", nombre: "3. Vertical Chest Press", grupo: "Pecho", sciatica: "green", snc: 3, planB: "Press Convergente", tags: ["Miercoles"] },
    { id: "remo_sent", nombre: "4. Remo Sentado (Unificado)", grupo: "Espalda", sciatica: "yellow", snc: 3, planB: "Polea baja triángulo", tags: ["Martes", "Sabado"], pasos: [["1. Pecho", "Mantén el pecho erguido contra el apoyo."], ["2. Tracción", "Codos hacia atrás rozando el cuerpo."]] },
    { id: "jalon_pech", nombre: "5. Jalón al Pecho", grupo: "Espalda", sciatica: "green", snc: 3, planB: "Dominadas asistidas", tags: ["Martes", "Sabado"] },
    { id: "dom_asist", nombre: "6. Dominadas Asistidas", grupo: "Espalda", sciatica: "green", snc: 3, planB: "Jalón al pecho", tags: ["Martes"] },
    { id: "ext_lumb", nombre: "7. Extensión Lumbar Placas", grupo: "Espalda", sciatica: "yellow", snc: 2, planB: "Banco extensiones", tags: ["Martes"] },
    { id: "homb_conv", nombre: "8. Press Hombro Convergente", grupo: "Hombro", sciatica: "green", snc: 3, planB: "Press Pecho (alternativo)", tags: ["Miercoles", "Sabado"] },
    { id: "homb_est", nombre: "9. Press Hombro (Estación)", grupo: "Hombro", sciatica: "green", snc: 3, planB: "Press Hombro Conv.", tags: ["Miercoles"] },
    { id: "rev_fly", nombre: "10. Deltoides Posterior Fly", grupo: "Hombro", sciatica: "green", snc: 2, planB: "Remo codos altos", tags: ["Martes", "Sabado"] },
    { id: "curl_bic", nombre: "11. Curl de Bíceps (Unificado)", grupo: "Brazos", sciatica: "green", snc: 1, planB: "Polea baja barra", tags: ["Martes", "Sabado"] },
    { id: "press_tri", nombre: "12. Press Tríceps Sentado", grupo: "Brazos", sciatica: "green", snc: 1, planB: "Fondos asistidos", tags: ["Miercoles", "Sabado"] },
    { id: "pren_45", nombre: "13. Prensa Inclinada 45°", grupo: "Pierna", sciatica: "yellow", snc: 4, planB: "Prensa horizontal", tags: ["Lunes", "Viernes"], pasos: [["1. Pies", "En la zona media de la plataforma."], ["2. Bajada", "Baja lento, vigila el lumbar."]], errores: [["Bloqueo", "No estires las rodillas del todo."]] },
    { id: "pren_horiz", nombre: "14. Prensa Horizontal", grupo: "Pierna", sciatica: "yellow", snc: 3, planB: "Prensa 45°", tags: ["Lunes", "Viernes", "Sabado"] },
    { id: "ext_cuad", nombre: "15. Extensión Cuádriceps", grupo: "Pierna", sciatica: "green", snc: 2, planB: "Prensa (Pies bajos)", tags: ["Lunes", "Viernes"] },
    { id: "flex_acos", nombre: "16. Flexión Pierna Acostado", grupo: "Pierna", sciatica: "green", snc: 2, planB: "Flexión sentado", tags: ["Lunes", "Viernes"] },
    { id: "flex_sent", nombre: "17. Flexión Pierna Sentado", grupo: "Pierna", sciatica: "green", snc: 2, planB: "Flexión acostado", tags: ["Lunes", "Viernes"] },
    { id: "hip_thrust_mat", nombre: "18. Hip Thrust (Matrix)", grupo: "Glúteo", sciatica: "green", snc: 4, planB: "Prensa (Pies altos)", tags: ["Lunes", "Viernes", "Sabado"], pasos: [["1. Apoyo", "Cinturón ajustado."], ["2. Empuje", "Talones fuertes, aprieta arriba."]] },
    { id: "abd_est", nombre: "19. Abductor (Estación)", grupo: "Pierna", sciatica: "green", snc: 1, planB: "Otra unidad abductor", tags: ["Lunes", "Viernes", "Sabado"] },
    { id: "add_est", nombre: "20. Adductor (Estación)", grupo: "Pierna", sciatica: "green", snc: 1, planB: "Otra unidad adductor", tags: ["Lunes", "Viernes"] },
    { id: "gem_sent", nombre: "21. Gemelo Sentado", grupo: "Pierna", sciatica: "green", snc: 1, planB: "Puntas en prensa", tags: ["Lunes", "Viernes"] },
    { id: "crunch_unif", nombre: "22. Crunch Abdominal", grupo: "Core", sciatica: "green", snc: 1, planB: "Plancha frontal", tags: ["Lunes", "Viernes", "Sabado"] },
    { id: "back_ext", nombre: "23. Extensión Espalda", grupo: "Core", sciatica: "yellow", snc: 2, planB: "Hiperextensiones", tags: ["Martes"] },
    { id: "smith_maq", nombre: "24. Smith Machine", grupo: "Multiuso", sciatica: "yellow", snc: 4, planB: "Mancuernas", tags: ["Lunes", "Sabado"] },
    { id: "decl_bench", nombre: "25. Decline Bench Press", grupo: "Pecho", sciatica: "green", snc: 4, planB: "Press Smith", tags: ["Miercoles", "Sabado"] },
    { id: "poleas_acc", nombre: "26. Poleas y Accesorios", grupo: "Multiuso", sciatica: "green", snc: 2, planB: "Plan B funcional", tags: ["Martes", "Miercoles", "Viernes"] },
    { id: "gem_pie", nombre: "27. Gemelo de Pie", grupo: "Pierna", sciatica: "green", snc: 1, planB: "Gemelo sentado", tags: ["Sabado"] }
];
/* --- LÓGICA DE LA APLICACIÓN (ORDEN POR FATIGA SNC) --- */

const resumenDias = { 
    "Lunes": "Piernas & Core", 
    "Martes": "Espalda & Bíceps", 
    "Miercoles": "Pecho, Hombro & Tríceps", 
    "Jueves": "Descanso", 
    "Viernes": "Piernas & Core", 
    "Sabado": "Full Body (Fuerza)", 
    "Domingo": "Libre" 
};

let currentId = "";

/**
 * Función principal: Filtra y ordena por SNC
 */
function showDay(day, btn) {
    // UI: Activar botón
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    const container = document.getElementById('routineList');
    
    // Gestión de días de descanso
    if(day === 'Jueves' || day === 'Domingo') {
        container.innerHTML = `
            <div style="text-align:center; padding:40px; color:var(--primary-dark);">
                <i class="material-icons" style="font-size:60px; opacity:0.3;">hotel</i>
                <br><strong>DÍA DE DESCANSO</strong>
                <p style="font-size:12px; color:#666;">La recuperación es parte del entrenamiento.</p>
            </div>`;
        return;
    }

    // 1. Filtrar máquinas por el tag del día
    let filtrados = machines.filter(m => m.tags?.includes(day));

    // 2. ORDENAR POR SNC (Fatiga: 4 arriba, 1 abajo)
    filtrados.sort((a, b) => {
        return (b.snc || 1) - (a.snc || 1);
    });

    // 3. Renderizar HTML
    let html = `
        <div style="margin-bottom:15px; border-left: 4px solid var(--primary); padding-left: 15px; background: #fffaf5; padding-top:10px; padding-bottom:10px; border-radius:0 10px 10px 0;">
            <small style="text-transform:uppercase; letter-spacing:1px; color:#777;">Foco de hoy:</small><br>
            <strong style="font-size:18px;">${resumenDias[day]}</strong>
        </div>`;

    const grupos = [...new Set(filtrados.map(m => m.grupo))];
    
    grupos.forEach(g => {
        html += `<div class="muscle-header">${g}</div>`;
        filtrados.filter(m => m.grupo === g).forEach(m => {
            html += `
                <button class="btn btn-main" onclick="openModal('${m.id}')" style="text-align:left; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span>${m.nombre}</span>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <span class="badge-snc" title="Nivel de Fatiga SNC">F${m.snc || 1}</span>
                        <i class="material-icons" style="margin-left:10px; font-size:18px; opacity:0.7;">bolt</i>
                    </div>
                </button>`;
        });
    });
    
    container.innerHTML = html;
}

/**
 * Abre el modal y carga los datos persistentes
 */
function openModal(id) {
    const m = machines.find(x => x.id === id);
    if(!m) return;
    currentId = id;

    // Títulos e imágenes
    document.getElementById('modalTitle').innerText = m.nombre;
    document.getElementById('modalMuscles').innerText = m.grupo;
    document.getElementById('imgTable').src = m.imgTable || "https://via.placeholder.com/400x200?text=Cargando+Anatomia...";
    document.getElementById('imgPhoto').src = m.imgPhoto || "https://via.placeholder.com/400x200?text=Foto+Gym+No+Disponible";

    // Cargar LocalStorage
    document.getElementById('setupInput').value = localStorage.getItem('setup_' + id) || "";
    document.getElementById('weightInput').value = localStorage.getItem('weight_' + id) || "";

    // Lógica Plan B
    const planBSect = document.getElementById('sectionPlanB');
    if(m.planB) {
        planBSect.style.display = 'block';
        document.getElementById('modalPlanB').innerText = m.planB;
    } else {
        planBSect.style.display = 'none';
    }

    // Vídeo
    const vContainer = document.getElementById('modalVideo');
    vContainer.innerHTML = m.video ? `<iframe src="${m.video}" frameborder="0" allowfullscreen></iframe>` : 
    `<div style="padding:20px; text-align:center; color:#888; background:#eee; border-radius:12px;">Sin vídeo de referencia</div>`;

    // Tablas de pasos y errores
    renderTable('sectionSteps', 'stepsTableContent', m.pasos);
    renderTable('sectionErrors', 'errorTableContent', m.errores);

    // Badge Ciática
    const sci = document.getElementById('modalSciatica');
    const colors = { 
        green: ['bg-green', 'APTO CIÁTICA'], 
        yellow: ['bg-yellow', 'CUIDADO LUMBAR'], 
        red: ['bg-red', 'RIESGO CIÁTICA'] 
    };
    const sData = colors[m.sciatica] || colors.green;
    sci.innerHTML = `<span class="badge-sciatica ${sData[0]}">${sData[1]}</span>`;

    // Mostrar modal
    document.getElementById('exerciseModal').classList.add('active');
    document.body.style.overflow = "hidden";
}

/**
 * Guarda el progreso en el navegador
 */
function saveExerciseData() {
    const setupVal = document.getElementById('setupInput').value;
    const weightVal = document.getElementById('weightInput').value;
    
    localStorage.setItem('setup_' + currentId, setupVal);
    localStorage.setItem('weight_' + currentId, weightVal);
    
    // Feedback visual breve
    const btn = event.target;
    const originalText = btn.innerText;
    btn.innerText = "¡GUARDADO!";
    btn.style.background = "var(--success)";
    
    setTimeout(() => {
        btn.innerText = originalText;
        btn.style.background = "";
    }, 1500);
}

/**
 * Helper para renderizar tablas dinámicas
 */
function renderTable(sectId, contId, data) {
    const sect = document.getElementById(sectId);
    if(data && data.length > 0) {
        sect.style.display = 'block';
        document.getElementById(contId).innerHTML = data.map(d => `
            <tr>
                <td style="width:30%; border-right:1px solid #eee;"><strong>${d[0]}</strong></td>
                <td>${d[1]}</td>
            </tr>`).join('');
    } else {
        sect.style.display = 'none';
    }
}

function closeModal() { 
    document.getElementById('exerciseModal').classList.remove('active'); 
    document.getElementById('modalVideo').innerHTML = ""; 
    document.body.style.overflow = "auto";
}

/**
 * Buscador global
 */
function filterMachines() {
    const q = document.getElementById('searchBar').value.toLowerCase();
    const listContainer = document.getElementById('allMachinesList');
    
    if(q.length < 2) {
        listContainer.innerHTML = "";
        return;
    }

    const f = machines.filter(m => 
        m.nombre.toLowerCase().includes(q) || 
        m.grupo.toLowerCase().includes(q)
    );

    listContainer.innerHTML = f.map(m => `
        <div class="btn btn-outline" onclick="openModal('${m.id}')" style="margin-bottom:5px;">
            <span><strong>${m.nombre}</strong> <small style="color:#999; margin-left:5px;">(${m.grupo})</small></span>
            <i class="material-icons" style="font-size:18px;">info</i>
        </div>`).join('');
}
</script>
</body>
</html>
