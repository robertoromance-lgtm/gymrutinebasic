<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Gym Pro - v3 Correcta</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --warning: #f1c40f;
            --danger: #e74c3c;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 50px; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        
        h1, h2 { text-align: center; color: var(--primary); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .material-icons { vertical-align: middle; }

        .card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .badge-sciatica { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; color: white; margin-bottom: 10px; }
        .bg-green { background-color: var(--success); }
        .bg-yellow { background-color: var(--warning); color: #000; }
        .bg-red { background-color: var(--danger); }

        .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 8px; text-align: center; text-decoration: none; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; }
        .btn-outline { border: 1px solid #ddd; color: var(--primary); background: white; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        
        .days-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(75px, 1fr)); gap: 8px; margin-bottom: 20px; }
        .day-btn { padding: 10px 5px; font-size: 12px; background: #eee; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .day-btn.active { background: var(--accent); color: white; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; overflow-y: auto; z-index: 1000; padding: 10px; }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; }
        .modal-content { background: white; border-radius: 15px; padding: 20px; width: 100%; max-width: 500px; margin-top: 20px; position: relative; }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 30px; cursor: pointer; }

        .modal-img { width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #eee; background: #f9f9f9; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; margin: 15px 0; background: #000; border-radius: 10px; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .progress-box { background: #f0f7ff; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #d0e3ff; }
        .progress-box input { width: 80px; padding: 8px; text-align: center; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }

        #searchBar { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 15px; box-sizing: border-box; }
        
        .muscle-header { background: #eef2f3; padding: 5px 10px; border-radius: 5px; color: var(--accent); font-weight: bold; margin-top: 15px; font-size: 14px; text-transform: uppercase; border-left: 4px solid var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="material-icons">fitness_center</i> Mi Gym Pro</h1>

    <section class="card">
        <h2><i class="material-icons">calendar_today</i> Mi Rutina Semanal</h2>
        <div class="days-grid">
            <button class="day-btn" onclick="showDay('Lunes', this)">LUN</button>
            <button class="day-btn" onclick="showDay('Martes', this)">MAR</button>
            <button class="day-btn" onclick="showDay('Miercoles', this)">MIE</button>
            <button class="day-btn" onclick="showDay('Jueves', this)">JUE</button>
            <button class="day-btn" onclick="showDay('Viernes', this)">VIE</button>
            <button class="day-btn" onclick="showDay('Sabado', this)">SAB</button>
            <button class="day-btn" onclick="showDay('Domingo', this)">DOM</button>
        </div>
        <div id="routineList">
            <p style="text-align:center; color:#888;">Toca un día para empezar.</p>
        </div>
    </section>

    <section class="card">
        <h2><i class="material-icons">list_alt</i> Buscador General</h2>
        <input type="text" id="searchBar" placeholder="Buscar máquina..." onkeyup="filterMachines()">
        <div id="allMachinesList"></div>
    </section>
</div>

<div class="modal" id="exerciseModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modalSciatica"></div>
        <h2 id="modalTitle"></h2>
        <p id="modalMuscles" style="color:var(--accent); font-weight:bold;"></p>
        <div class="video-container" id="modalVideo"></div>
        <div class="progress-box">
            <strong><i class="material-icons">trending_up</i> Peso (kg):</strong>
            <input type="number" id="weightInput">
            <button class="btn-main" onclick="saveWeight()" style="display:inline; width:auto; padding:8px">Guardar</button>
        </div>
        <div style="margin-top:15px;"><p id="modalNote" style="font-style:italic; color:#666;"></p></div>
        <h3>Guía Visual</h3>
        <img id="imgTable" class="modal-img" src="">
        <img id="imgPhoto" class="modal-img" src="">
        <button class="btn btn-main" onclick="closeModal()">Cerrar</button>
    </div>
</div>

<script>
const machines = [
    // PECHO
    { id: "p_conv", nombre: "Press Pecho Convergente", grupo: "Pecho", sciatica: "green", tags: ["Miercoles", "Sabado"], nota: "Discos: permite cargas pesadas." },
    { id: "p_vert", nombre: "Press Pecho Vertical", grupo: "Pecho", sciatica: "green", tags: ["Miercoles"], nota: "Estabilidad total." },
    { id: "peck_deck", nombre: "Peck Deck", grupo: "Pecho", sciatica: "green", tags: ["Miercoles"], nota: "Mantén tensión." },
    // ESPALDA
    { id: "jalon_p", nombre: "Jalón al Pecho", grupo: "Espalda", sciatica: "green", tags: ["Martes", "Sabado"], nota: "No balancear." },
    { id: "remo_s", nombre: "Remo Sentado", grupo: "Espalda", sciatica: "yellow", tags: ["Martes"], nota: "Espalda recta." },
    { id: "remo_conv", nombre: "Remo Convergente", grupo: "Espalda", sciatica: "green", tags: ["Martes", "Sabado"], nota: "Grosor y fuerza." },
    // PIERNAS
    { id: "prensa_i", nombre: "Prensa Inclinada", grupo: "Pierna", sciatica: "yellow", tags: ["Lunes", "Viernes", "Sabado"], nota: "No bloquees rodillas." },
    { id: "ext_cuad", nombre: "Extensión Cuádriceps", grupo: "Pierna", sciatica: "green", tags: ["Lunes", "Viernes"], nota: "Aislamiento." },
    { id: "curl_fem", nombre: "Curl Femoral", grupo: "Pierna", sciatica: "green", tags: ["Lunes", "Viernes"], nota: "Isquios." },
    // HOMBROS / DELTOIDES
    { id: "press_h", nombre: "Press Hombro Conv.", grupo: "Hombro", sciatica: "green", tags: ["Miercoles", "Sabado"], nota: "Empuje seguro." },
    { id: "vuelos_post", nombre: "Vuelos Posteriores", grupo: "Hombro", sciatica: "green", tags: ["Martes", "Miercoles"], nota: "Aspecto redondeado." },
    // BRAZOS
    { id: "curl_b", nombre: "Curl Bíceps Scott", grupo: "Bíceps", sciatica: "green", tags: ["Martes"], nota: "Aislamiento." },
    { id: "ext_tri", nombre: "Extensiones Tríceps", grupo: "Tríceps", sciatica: "green", tags: ["Miercoles"], nota: "Codos pegados." },
    // CORE / ABDOMINAL
    { id: "crunch", nombre: "Crunch Abdominal", grupo: "Abdominal", sciatica: "yellow", tags: ["Lunes", "Miercoles", "Viernes", "Sabado"], nota: "Usa el abdomen." },
    { id: "paralelas", nombre: "Elevación Paralelas", grupo: "Abdominal", sciatica: "green", tags: ["Lunes", "Viernes", "Sabado"], nota: "Zona baja." }
];

const resumenDias = {
    "Lunes": "Piernas + Abdominales + Cardio",
    "Martes": "Espalda + Bíceps + Deltoides + Cardio",
    "Miercoles": "Pecho + Hombro + Tríceps + Abdominales",
    "Jueves": "Descanso",
    "Viernes": "Piernas + Abdominales + Cardio",
    "Sabado": "Full Body (Resumen) + Cardio",
    "Domingo": "Libre"
};

function showDay(day, btn) {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const container = document.getElementById('routineList');
    
    // 1. Caso Descanso/Libre
    if(day === 'Jueves' || day === 'Domingo') {
        container.innerHTML = `
            <div style="text-align:center; padding:30px; color:var(--primary);">
                <i class="material-icons" style="font-size:48px;">spa</i><br>
                <strong>Día de ${resumenDias[day]}</strong>.<br>¡Recupera energías!
            </div>`;
        return;
    }

    // 2. Título de qué toca hoy
    let html = `<div style="margin-bottom:15px;">
                    <small style="color:var(--accent); font-weight:bold;">HOY TOCA:</small><br>
                    <strong style="font-size:18px;">${resumenDias[day]}</strong>
                </div>`;

    // 3. Filtrar y agrupar por músculo
    const filtrados = machines.filter(m => m.tags.includes(day));
    
    // Agrupamos para que salga "PECHO", luego sus máquinas, luego "TRICEPS"...
    const gruposEncontrados = [...new Set(filtrados.map(m => m.grupo))];
    
    gruposEncontrados.forEach(g => {
        html += `<div class="muscle-header">${g}</div>`;
        const maquinasGrupo = filtrados.filter(m => m.grupo === g);
        maquinasGrupo.forEach(m => {
            html += `
                <button class="btn btn-main" onclick="openModal('${m.id}')" style="text-align:left; display:flex; justify-content:space-between;">
                    ${m.nombre} <i class="material-icons">play_circle_outline</i>
                </button>`;
        });
    });

    container.innerHTML = html;
}

// Funciones de soporte
function openModal(id) {
    const m = machines.find(x => x.id === id);
    document.getElementById('modalTitle').innerText = m.nombre;
    document.getElementById('modalMuscles').innerText = m.grupo;
    document.getElementById('modalNote').innerText = m.nota;
    document.getElementById('imgTable').src = "https://via.placeholder.com/400x200?text=Subir+Foto+Tabla";
    document.getElementById('imgPhoto').src = "https://via.placeholder.com/400x200?text=Subir+Foto+Gym";
    document.getElementById('exerciseModal').classList.add('active');
}
function closeModal() { document.getElementById('exerciseModal').classList.remove('active'); }
function saveWeight() { alert("Peso guardado!"); }
function filterMachines() {
    const q = document.getElementById('searchBar').value.toLowerCase();
    const f = machines.filter(m => m.nombre.toLowerCase().includes(q));
    document.getElementById('allMachinesList').innerHTML = f.map(m => `<div class="btn btn-outline" onclick="openModal('${m.id}')">${m.nombre}</div>`).join('');
}

// Iniciar con el catálogo cargado
filterMachines();
</script>
</body>
</html>
