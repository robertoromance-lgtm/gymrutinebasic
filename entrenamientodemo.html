<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymPro Smart - All-in-One</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --primary: #e67e22; --primary-dark: #d35400; --bg: #fff5ed; --card-bg: #ffffff; --success: #27ae60; --danger: #e74c3c; --warning: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 50px; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 12px rgba(230,126,34,0.1); }
        
        /* Botones y UI */
        .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.3s; margin-top: 8px; text-decoration: none; box-sizing: border-box; text-align: center; }
        .btn-main { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
        .btn-planb { background: #fff1f0; color: #cf1322; border: 1px solid #ffa39e; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .days-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 8px; margin-bottom: 20px; }
        .day-btn { padding: 12px 5px; font-size: 11px; background: white; border: 1px solid #eee; border-radius: 10px; cursor: pointer; font-weight: bold; color: var(--primary-dark); }
        .day-btn.active { background: var(--primary); color: white; }
        
        .badge-sciatica { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; color: white; }
        .bg-green { background-color: var(--success); }
        .bg-yellow { background-color: var(--warning); color: #000; }
        .bg-red { background-color: var(--danger); }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; overflow-y: auto; z-index: 1000; padding: 10px; }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; }
        .modal-content { background: white; border-radius: 20px; padding: 25px; width: 100%; max-width: 500px; margin-top: 20px; position: relative; border-top: 6px solid var(--primary); }
        
        .info-section { margin-top: 15px; padding: 12px; border-radius: 10px; background: #fefefe; border: 1px solid #eee; }
        .setup-box { background: #fffbe6; border: 1px solid #ffe58f; }
        .setup-input { width: 100%; border: none; background: transparent; font-size: 16px; font-weight: bold; color: #856404; outline: none; padding: 5px 0; border-bottom: 1px dashed #ffe58f; }
        
        .info-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .info-table th { background: #f8f9fa; text-align: left; padding: 8px; border-bottom: 2px solid #eee; }
        .info-table td { padding: 8px; border-bottom: 1px solid #eee; }
        
        .modal-img { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid #eee; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin: 15px 0; border-radius: 10px; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .muscle-header { background: #fff0e0; padding: 8px 12px; border-radius: 8px; color: var(--primary-dark); font-weight: 800; margin-top: 20px; font-size: 12px; text-transform: uppercase; border-left: 5px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="material-icons">bolt</i> GymPro Smart</h1>
    
    <div class="days-grid" id="daySelector">
        <button class="day-btn" onclick="showDay('Lunes', this)">LUN</button>
        <button class="day-btn" onclick="showDay('Martes', this)">MAR</button>
        <button class="day-btn" onclick="showDay('Miercoles', this)">MIE</button>
        <button class="day-btn" onclick="showDay('Jueves', this)">JUE</button>
        <button class="day-btn" onclick="showDay('Viernes', this)">VIE</button>
        <button class="day-btn" onclick="showDay('Sabado', this)">SAB</button>
    </div>

    <div id="routineList"></div>

    <section class="card" style="margin-top:20px;">
        <h2><i class="material-icons">search</i> Buscador</h2>
        <input type="text" id="searchBar" placeholder="Ej: Prensa, Pecho..." onkeyup="filterMachines()" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd;">
        <div id="allMachinesList"></div>
    </section>
</div>

<div class="modal" id="exerciseModal">
    <div class="modal-content">
        <span style="position:absolute; top:15px; right:20px; font-size:30px; cursor:pointer; color:#999;" onclick="closeModal()">&times;</span>
        
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div id="modalSciatica"></div>
            <div id="sncStatus"></div>
        </div>

        <h2 id="modalTitle" style="text-align:left; margin:10px 0;"></h2>
        <p id="modalMuscleLabel" style="color:var(--primary); font-weight:bold; margin-top:0; font-size:14px;"></p>

        <div class="info-section setup-box">
            <strong style="color:#856404; font-size:11px; display:flex; align-items:center; gap:5px;">
                <i class="material-icons" style="font-size:14px;">settings</i> MI SETUP PERSONALIZADO
            </strong>
            <input type="text" id="setupInput" class="setup-input" placeholder="Toca para anotar tus ajustes (Sillín, etc)..." onchange="saveSetup()">
        </div>

        <button class="btn btn-planb" onclick="togglePlanB()" id="btnPlanB">
            <i class="material-icons">block</i> ¡ESTÁ OCUPADA! VER PLAN B
        </button>
        <div id="planBBox" class="info-section" style="display:none; background:#f0f5ff; border-color:#adc6ff;">
            <strong style="color:#2b6cb0;">🚀 Alternativa:</strong>
            <p id="modalPlanB" style="margin:5px 0; font-weight:bold;"></p>
        </div>

        <div class="video-container" id="modalVideo"></div>

        <div class="info-section">
            <strong style="font-size:14px;">Mi Peso Actual:</strong> 
            <input type="number" id="weightInput" style="width:70px; padding:8px; border-radius:8px; border:1px solid #ccc; font-weight:bold;"> kg
            <button class="btn-main" onclick="saveWeight()" style="display:inline; width:auto; padding:8px 15px; margin-left:5px; font-size:12px;">Guardar</button>
        </div>

        <div id="dynamicSections"></div>

        <div style="margin-top:20px;">
            <p><strong>Músculos / Tabla:</strong></p>
            <img id="imgTable" class="modal-img" src="">
            <p><strong>Máquina en el Gym:</strong></p>
            <img id="imgPhoto" class="modal-img" src="">
        </div>

        <button class="btn btn-main" onclick="closeModal()" style="margin-top:20px;">VOLVER</button>
    </div>
</div>

const resumenDias = { "Lunes": "Piernas", "Martes": "Espalda", "Miercoles": "Pecho", "Jueves": "Descanso", "Viernes": "Piernas", "Sabado": "Full Body" };

let currentId = null;

function showDay(day, btn) {
    if(btn) {
        document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    const container = document.getElementById('routineList');
    if(day === 'Jueves' || day === 'Domingo') {
        container.innerHTML = `<div style="text-align:center; padding:40px; color:var(--primary-dark);"><i class="material-icons" style="font-size:60px;">spa</i><br><strong>Día de Descanso</strong></div>`;
        return;
    }
    
    let html = `<div style="margin-bottom:15px; border-left: 4px solid var(--primary); padding-left: 15px;"><small>Enfoque de hoy:</small><br><strong style="font-size:18px;">${resumenDias[day]}</strong></div>`;
    
    const filtrados = machines.filter(m => m.tags.includes(day));
    filtrados.sort((a, b) => a.prioridad - b.prioridad); // ORDENAR POR PRIORIDAD SNC

    const grupos = [...new Set(filtrados.map(m => m.grupo))];
    grupos.forEach(g => {
        html += `<div class="muscle-header">${g}</div>`;
        filtrados.filter(m => m.grupo === g).forEach(m => {
            const icons = ["battery_full", "battery_6_bar", "battery_3_bar", "battery_alert"];
            html += `
                <button class="btn" style="background:white; border:1px solid #eee; color:#333; text-align:left; display:flex; justify-content:space-between; align-items:center;" onclick="openModal('${m.id}')">
                    <span>${m.nombre}</span>
                    <i class="material-icons" style="color:${getSncColor(m.prioridad)}; font-size:18px;">${icons[m.prioridad-1]}</i>
                </button>`;
        });
    });
    container.innerHTML = html;
}

function openModal(id) {
    const m = machines.find(x => x.id === id);
    if(!m) return;
    currentId = id;
    
    document.getElementById('modalTitle').innerText = m.nombre;
    document.getElementById('modalMuscleLabel').innerText = m.grupo;
    document.getElementById('modalPlanB').innerText = m.planB || "Consulta al monitor";
    document.getElementById('planBBox').style.display = 'none';
    
    // Cargar Imágenes
    document.getElementById('imgTable').src = m.imgTable || "";
    document.getElementById('imgPhoto').src = m.imgPhoto || "";
    document.getElementById('imgTable').style.display = m.imgTable ? "block" : "none";
    document.getElementById('imgPhoto').style.display = m.imgPhoto ? "block" : "none";

    // Sciatica & SNC
    const colors = { green: ['bg-green', 'OK CIÁTICA'], yellow: ['bg-yellow', 'CUIDADO'], red: ['bg-red', 'RIESGO'] };
    const sData = colors[m.sciatica] || colors.green;
    document.getElementById('modalSciatica').innerHTML = `<span class="badge-sciatica ${sData[0]}">${sData[1]}</span>`;
    
    const icons = ["battery_full", "battery_6_bar", "battery_3_bar", "battery_alert"];
    document.getElementById('sncStatus').innerHTML = `<span style="font-size:10px; font-weight:bold; color:${getSncColor(m.prioridad)}">FATIGA SNC</span><i class="material-icons" style="color:${getSncColor(m.prioridad)}; vertical-align:middle; margin-left:5px;">${icons[m.prioridad-1]}</i>`;

    // Video
    const v = document.getElementById('modalVideo');
    v.innerHTML = m.video ? `<iframe src="${m.video}" frameborder="0" allowfullscreen></iframe>` : "<p style='color:white; text-align:center; padding-top:20%;'>Video próximamente</p>";

    // Setup y Peso
    document.getElementById('setupInput').value = localStorage.getItem('setup_' + id) || "";
    document.getElementById('weightInput').value = localStorage.getItem('weight_' + id) || "";

    // Secciones de texto (Pasos, Errores, Consejos)
    let dynamicHtml = "";
    if(m.pasos) dynamicHtml += renderTable("format_list_numbered", "Paso a paso", m.pasos, "#f0f9ff", "#2b6cb0");
    if(m.errores) dynamicHtml += renderTable("report_problem", "Errores comunes", m.errores, "#fff1f0", "#cf1322");
    if(m.consejos) {
        dynamicHtml += `<div class="info-section" style="background:#f6ffed; border-color:#b7eb8f;">
            <strong style="color:#389e0d; display:flex; align-items:center; gap:5px;"><i class="material-icons" style="font-size:16px;">tips_and_updates</i> Consejos Técnicos</strong>
            <ul style="padding-left:20px; margin:8px 0; font-size:13px;">${m.consejos.map(c => `<li>${c}</li>`).join('')}</ul>
        </div>`;
    }
    document.getElementById('dynamicContent').innerHTML = dynamicHtml;

    document.getElementById('exerciseModal').classList.add('active');
    document.body.style.overflow = "hidden";
}

function renderTable(icon, title, data, bg, color) {
    return `<div class="info-section" style="background:${bg}; border-color:${color}33;">
        <strong style="color:${color}; display:flex; align-items:center; gap:5px;"><i class="material-icons" style="font-size:16px;">${icon}</i> ${title}</strong>
        <table class="info-table">
            ${data.map(d => `<tr><td><strong>${d[0]}</strong></td><td>${d[1]}</td></tr>`).join('')}
        </table>
    </div>`;
}

function getSncColor(p) { return ["#27ae60", "#f1c40f", "#e67e22", "#e74c3c"][p-1]; }

function saveSetup() { localStorage.setItem('setup_' + currentId, document.getElementById('setupInput').value); }
function saveWeight() { localStorage.setItem('weight_' + currentId, document.getElementById('weightInput').value); alert("Peso guardado"); }
function togglePlanB() { const box = document.getElementById('planBBox'); box.style.display = box.style.display === 'none' ? 'block' : 'none'; }
function closeModal() { document.getElementById('exerciseModal').classList.remove('active'); document.getElementById('modalVideo').innerHTML = ""; document.body.style.overflow = "auto"; }

function filterMachines() {
    const q = document.getElementById('searchBar').value.toLowerCase();
    const f = machines.filter(m => m.nombre.toLowerCase().includes(q) || m.grupo.toLowerCase().includes(q));
    document.getElementById('allMachinesList').innerHTML = f.map(m => `
        <button class="btn" style="background:white; border:1px solid #ddd; color:#333; text-align:left;" onclick="openModal('${m.id}')">
            <strong>${m.nombre}</strong><br><small style="color:#888;">${m.grupo}</small>
        </button>`).join('');
}

showDay('Lunes', document.querySelector('.day-btn'));
filterMachines();
</script>
