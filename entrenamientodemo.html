<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Gym Pro - Orange Edition</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #e67e22; 
            --primary-dark: #d35400; 
            --accent: #f39c12; 
            --success: #27ae60;
            --warning: #f1c40f;
            --danger: #e74c3c;
            --bg: #fff5ed; 
            --card-bg: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 50px; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        
        h1, h2 { text-align: center; color: var(--primary-dark); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .material-icons { vertical-align: middle; }

        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 12px rgba(230, 126, 34, 0.1); border: 1px solid rgba(230, 126, 34, 0.1); }
        
        .badge-sciatica { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; color: white; margin-bottom: 10px; }
        .bg-green { background-color: var(--success); }
        .bg-yellow { background-color: var(--warning); color: #000; }
        .bg-red { background-color: var(--danger); }

        .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 8px; text-align: center; text-decoration: none; box-sizing: border-box; font-weight: 600; }
        .btn-main { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: 0 4px 6px rgba(211, 84, 0, 0.2); }
        .btn-main:active { transform: scale(0.98); }
        .btn-outline { border: 1px solid #ddd; color: var(--primary-dark); background: white; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        
        .days-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(75px, 1fr)); gap: 8px; margin-bottom: 20px; }
        .day-btn { padding: 12px 5px; font-size: 12px; background: white; border: 1px solid #eee; border-radius: 10px; cursor: pointer; font-weight: bold; color: var(--primary-dark); }
        .day-btn.active { background: var(--primary); color: white; border-color: var(--primary-dark); box-shadow: 0 3px 6px rgba(0,0,0,0.1); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; overflow-y: auto; z-index: 1000; padding: 10px; }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; }
        .modal-content { background: white; border-radius: 20px; padding: 25px; width: 100%; max-width: 500px; margin-top: 20px; position: relative; border-top: 6px solid var(--primary); }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #999; }

        .modal-img { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid #eee; background: #fafafa; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; margin: 15px 0; background: #000; border-radius: 12px; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .progress-box { background: #fff8f0; padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid #ffe0bd; }
        .progress-box input { width: 80px; padding: 10px; text-align: center; border-radius: 8px; border: 1px solid #ccc; font-size: 18px; color: var(--primary-dark); font-weight: bold; }

        #searchBar { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; outline: none; }
        .muscle-header { background: #fff0e0; padding: 8px 12px; border-radius: 8px; color: var(--primary-dark); font-weight: 800; margin-top: 20px; font-size: 13px; text-transform: uppercase; border-left: 5px solid var(--primary); letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="material-icons">fitness_center</i> Mi Gym Pro</h1>

    <section class="card">
        <h2><i class="material-icons">calendar_today</i> Mi Rutina Semanal</h2>
        <div class="days-grid">
            <button class="day-btn" onclick="showDay('Lunes', this)">LUN</button>
            <button class="day-btn" onclick="showDay('Martes', this)">MAR</button>
            <button class="day-btn" onclick="showDay('Miercoles', this)">MIE</button>
            <button class="day-btn" onclick="showDay('Jueves', this)">JUE</button>
            <button class="day-btn" onclick="showDay('Viernes', this)">VIE</button>
            <button class="day-btn" onclick="showDay('Sabado', this)">SAB</button>
            <button class="day-btn" onclick="showDay('Domingo', this)">DOM</button>
        </div>
        <div id="routineList">
            <p style="text-align:center; color:#999; padding: 20px;">Toca un día para ver tu entrenamiento.</p>
        </div>
    </section>

    <section class="card">
        <h2><i class="material-icons">search</i> Buscador</h2>
        <input type="text" id="searchBar" placeholder="Ej: Prensa, Pecho, Bíceps..." onkeyup="filterMachines()">
        <div id="allMachinesList"></div>
    </section>
</div>

<div class="modal" id="exerciseModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modalSciatica"></div>
        <h2 id="modalTitle" style="text-align: left; margin: 5px 0;"></h2>
        <p id="modalMuscles" style="color:var(--primary); font-weight:bold; margin-top:0;"></p>
        
        <div class="video-container" id="modalVideo"></div>
        
        <div class="progress-box">
            <strong><i class="material-icons" style="font-size:18px; color:var(--primary);">trending_up</i> Mi Peso Actual:</strong><br><br>
            <input type="number" id="weightInput" placeholder="0"> kg 
            <button class="btn-main" onclick="saveWeight()" style="display:inline; width:auto; padding:10px 20px; margin-left:10px;">Guardar</button>
        </div>

        <div style="margin-top:20px;">
            <p><strong><i class="material-icons" style="font-size:18px; color:var(--primary);">info</i> Nota de Entrenamiento:</strong></p>
            <p id="modalNote" style="font-style: italic; color: #555; line-height: 1.5;"></p>
        </div>

        <h3 style="border-bottom: 2px solid #eee; padding-bottom: 5px;">📋 Identificación</h3>
        <p><strong>Músculos implicados:</strong></p>
        <img id="imgTable" class="modal-img" src="">
        <p><strong>Máquina en el Gym:</strong></p>
        <img id="imgPhoto" class="modal-img" src="">
        
        <button class="btn btn-main" onclick="closeModal()" style="margin-top:25px;">Volver</button>
    </div>
</div>

<script>
const machines = [
    { 
        id: "prensa_i", 
        nombre: "Prensa Inclinada", 
        grupo: "Pierna", 
        sciatica: "yellow", 
        tags: ["Lunes", "Viernes", "Sabado"], 
        video: "https://www.youtube.com/embed/lrkMoax-TSs?si=0_iZVbE4WvnwQOjd",
        imgTable: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj-WIuh5zFJb-sb-p7glwkldaI-SAe9rZdTy1MkWzqx02MkoyHupvgbdKvPdRD7OejHo8QLwIw0jHaSNcoMxIdiIQPOFgYp1I2bzA4c5XUCglESWeGY-1rdWSvfcqa_yc2pAYVvPNojv4YFGiQnWOMDJGzFawx30uXuF32j7wan13SB71AG-pTXkr1rp6c/s16000/bench-press-hangi-kaslar%C4%B1-%C3%A7al%C4%B1%C5%9Ft%C4%B1r%C4%B1r.jpg", 
        imgPhoto: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgclqVw8ahAEJQcaEsVBKZDw_a1o-UaE92nevdFBLHvmDAaSvkLifj1LkJlNALZLtAZNj7ZR3OCWMBKxoNObTAxKDRIJFkA5gK9O-QrAkip4Nye7RNrpwfg2VnTDrs1txOtbjoouV44a1Y2Kc0EeTN5F_JpSYCAjuG3PnWCI8fSY7UfUaz4coOuUDX8nlg/s16000/press_delcinado-1024x569-1.png",
        nota: "No bloquees las rodillas al estirar. Mantén la espalda baja siempre pegada al respaldo para proteger la ciática." 
    },
    { id: "p_conv", nombre: "Press Pecho Convergente", grupo: "Pecho", sciatica: "green", tags: ["Miercoles", "Sabado"], video: "", imgTable: "", imgPhoto: "", nota: "La de discos permite cargas más pesadas y progresivas." },
    { id: "p_vert", nombre: "Press Pecho Vertical", grupo: "Pecho", sciatica: "green", tags: ["Miercoles"], video: "", imgTable: "", imgPhoto: "", nota: "Excelente para control total del movimiento." },
    { id: "peck_deck", nombre: "Peck Deck / Contractora", grupo: "Pecho", sciatica: "green", tags: ["Miercoles"], video: "", imgTable: "", imgPhoto: "", nota: "Mantén los codos alineados." },
    { id: "jalon_p", nombre: "Jalón al Pecho", grupo: "Espalda", sciatica: "green", tags: ["Martes", "Sabado"], video: "", imgTable: "", imgPhoto: "", nota: "Enfócate en bajar con el dorsal, no con los brazos." },
    { id: "remo_s", nombre: "Remo Sentado", grupo: "Espalda", sciatica: "yellow", tags: ["Martes"], video: "", imgTable: "", imgPhoto: "", nota: "Pecho fuera y espalda neutra." },
    { id: "remo_conv", nombre: "Remo Convergente", grupo: "Espalda", sciatica: "green", tags: ["Martes", "Sabado"], video: "", imgTable: "", imgPhoto: "", nota: "Ideal para ganar densidad en la espalda." },
    { id: "ext_lum", nombre: "Extensión Lumbar", grupo: "Espalda", sciatica: "green", tags: ["Martes", "Sabado"], video: "", imgTable: "", imgPhoto: "", nota: "Fortalece la zona baja con cuidado." },
    { id: "ext_cuad", nombre: "Extensión Cuádriceps", grupo: "Pierna", sciatica: "green", tags: ["Lunes", "Viernes"], video: "", imgTable: "", imgPhoto: "", nota: "Punta de los pies hacia arriba." },
    { id: "curl_fem", nombre: "Curl Femoral", grupo: "Pierna", sciatica: "green", tags: ["Lunes", "Viernes"], video: "", imgTable: "", imgPhoto: "", nota: "Controla el retorno del peso." },
    { id: "hip_thrust", nombre: "Hip Thrust Máquina", grupo: "Pierna", sciatica: "green", tags: ["Lunes", "Viernes", "Sabado"], video: "", imgTable: "", imgPhoto: "", nota: "Máxima contracción de glúteo arriba." },
    { id: "gemelo", nombre: "Gemelo Sentado", grupo: "Pierna", sciatica: "green", tags: ["Lunes", "Viernes"], video: "", imgTable: "", imgPhoto: "", nota: "Estira bien abajo." },
    { id: "press_h", nombre: "Press Hombro Conv.", grupo: "Hombro", sciatica: "green", tags: ["Miercoles", "Sabado"], video: "", imgTable: "", imgPhoto: "", nota: "Controla que los hombros no suban a las orejas." },
    { id: "vuelos_post", nombre: "Vuelos Posteriores", grupo: "Hombro", sciatica: "green", tags: ["Martes", "Miercoles"], video: "", imgTable: "", imgPhoto: "", nota: "Trabajo de detalle para hombro redondo." },
    { id: "curl_b", nombre: "Curl Bíceps Scott", grupo: "Bíceps", sciatica: "green", tags: ["Martes"], video: "", imgTable: "", imgPhoto: "", nota: "No estires el brazo al 100% para evitar tendinitis." },
    { id: "ext_tri", nombre: "Extensiones Tríceps", grupo: "Tríceps", sciatica: "green", tags: ["Miercoles"], video: "", imgTable: "", imgPhoto: "", nota: "Codos pegados al torso." },
    { id: "crunch", nombre: "Crunch Abdominal", grupo: "Abdominal", sciatica: "yellow", tags: ["Lunes", "Miercoles", "Viernes", "Sabado"], video: "", imgTable: "", imgPhoto: "", nota: "Enrolla la columna, no tires del cuello." },
    { id: "paralelas", nombre: "Elevación Paralelas", grupo: "Abdominal", sciatica: "green", tags: ["Lunes", "Viernes", "Sabado"], video: "", imgTable: "", imgPhoto: "", nota: "Evita el balanceo." }
];

const resumenDias = {
    "Lunes": "Piernas + Abdominales + Cardio",
    "Martes": "Espalda + Bíceps + Deltoides + Cardio",
    "Miercoles": "Pecho + Hombro + Tríceps + Abdominales",
    "Jueves": "Descanso",
    "Viernes": "Piernas + Abdominales + Cardio",
    "Sabado": "Full Body (Resumen) + Cardio",
    "Domingo": "Libre"
};

let selectedId = null;

function showDay(day, btn) {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const container = document.getElementById('routineList');
    
    if(day === 'Jueves' || day === 'Domingo') {
        container.innerHTML = `
            <div style="text-align:center; padding:40px; color:var(--primary-dark);">
                <i class="material-icons" style="font-size:60px;">spa</i><br><br>
                <strong style="font-size:18px;">Día de ${resumenDias[day]}</strong><br>
                <span style="color:#777;">¡Disfruta tu descanso!</span>
            </div>`;
        return;
    }

    let html = `<div style="margin-bottom:15px; border-left: 4px solid var(--primary); padding-left: 15px;">
                    <small style="color:var(--primary); font-weight:bold; text-transform: uppercase;">Hoy toca:</small><br>
                    <strong style="font-size:20px; color:var(--primary-dark);">${resumenDias[day]}</strong>
                </div>`;

    const filtrados = machines.filter(m => m.tags.includes(day));
    const grupos = [...new Set(filtrados.map(m => m.grupo))];
    
    grupos.forEach(g => {
        html += `<div class="muscle-header">${g}</div>`;
        filtrados.filter(m => m.grupo === g).forEach(m => {
            html += `
                <button class="btn btn-main" onclick="openModal('${m.id}')" style="text-align:left; display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <span>${m.nombre}</span>
                    <i class="material-icons">chevron_right</i>
                </button>`;
        });
    });

    container.innerHTML = html;
}

function openModal(id) {
    const m = machines.find(x => x.id === id);
    selectedId = id;
    document.getElementById('modalTitle').innerText = m.nombre;
    document.getElementById('modalMuscles').innerText = m.grupo;
    document.getElementById('modalNote').innerText = m.nota;
    document.getElementById('imgTable').src = m.imgTable || "https://via.placeholder.com/400x200?text=Subir+Foto+Tabla";
    document.getElementById('imgPhoto').src = m.imgPhoto || "https://via.placeholder.com/400x200?text=Subir+Foto+Gym";
    
    const vContainer = document.getElementById('modalVideo');
    vContainer.innerHTML = m.video ? `<iframe src="${m.video}" frameborder="0" allowfullscreen></iframe>` : `<div style="color:#999; padding:40px; text-align:center;">Video pendiente...</div>`;

    const sci = document.getElementById('modalSciatica');
    const colors = { green: ['bg-green', 'RECOMENDADO CIÁTICA'], yellow: ['bg-yellow', 'PRECAUCIÓN CIÁTICA'], red: ['bg-red', 'RIESGO CIÁTICA'] };
    sci.innerHTML = `<span class="badge-sciatica ${colors[m.sciatica][0]}">${colors[m.sciatica][1]}</span>`;

    document.getElementById('weightInput').value = localStorage.getItem('kg_' + id) || "";
    document.getElementById('exerciseModal').classList.add('active');
    document.body.style.overflow = "hidden";
}

function closeModal() { 
    document.getElementById('exerciseModal').classList.remove('active'); 
    document.getElementById('modalVideo').innerHTML = ""; 
    document.body.style.overflow = "auto";
}

function saveWeight() {
    localStorage.setItem('kg_' + selectedId, document.getElementById('weightInput').value);
    alert("¡Peso actualizado!");
}

function filterMachines() {
    const q = document.getElementById('searchBar').value.toLowerCase();
    const f = machines.filter(m => m.nombre.toLowerCase().includes(q) || m.grupo.toLowerCase().includes(q));
    document.getElementById('allMachinesList').innerHTML = f.map(m => `
        <div class="btn btn-outline" onclick="openModal('${m.id}')">
            <span><strong>${m.nombre}</strong><br><small style="color:#888;">${m.grupo}</small></span>
            <i class="material-icons" style="color:var(--primary);">info</i>
        </div>
    `).join('');
}

filterMachines();
</script>
</body>
</html>
