<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymPro Smart - Orange</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --primary: #e67e22; --primary-dark: #d35400; --bg: #fff5ed; --card-bg: #ffffff; --success: #27ae60; --danger: #e74c3c; --warning: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 50px; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 12px rgba(230,126,34,0.1); }
        .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.3s; margin-top: 8px; text-decoration: none; box-sizing: border-box; text-align: center; }
        .btn-main { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
        .btn-planb { background: #fff1f0; color: #cf1322; border: 1px solid #ffa39e; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .days-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 8px; margin-bottom: 20px; }
        .day-btn { padding: 12px 5px; font-size: 11px; background: white; border: 1px solid #eee; border-radius: 10px; cursor: pointer; font-weight: bold; color: var(--primary-dark); }
        .day-btn.active { background: var(--primary); color: white; }
        
        /* Modal y Secciones */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; overflow-y: auto; z-index: 1000; padding: 10px; }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; }
        .modal-content { background: white; border-radius: 20px; padding: 25px; width: 100%; max-width: 500px; margin-top: 20px; position: relative; border-top: 6px solid var(--primary); }
        .info-section { margin-top: 15px; padding: 12px; border-radius: 10px; background: #fefefe; border: 1px solid #eee; }
        .setup-box { background: #fffbe6; border: 1px solid #ffe58f; }
        .setup-input { width: 100%; border: none; background: transparent; font-size: 16px; font-weight: bold; color: #856404; outline: none; padding: 5px 0; border-bottom: 1px dashed #ffe58f; }
        
        .battery-icon { vertical-align: middle; margin-left: 5px; }
        .muscle-header { background: #fff0e0; padding: 8px 12px; border-radius: 8px; color: var(--primary-dark); font-weight: 800; margin-top: 20px; font-size: 12px; text-transform: uppercase; border-left: 5px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="material-icons">bolt</i> GymPro Smart</h1>
    
    <div class="days-grid" id="daySelector">
        <button class="day-btn" onclick="showDay('Lunes', this)">LUN</button>
        <button class="day-btn" onclick="showDay('Martes', this)">MAR</button>
        <button class="day-btn" onclick="showDay('Miercoles', this)">MIE</button>
        <button class="day-btn" onclick="showDay('Jueves', this)">JUE</button>
        <button class="day-btn" onclick="showDay('Viernes', this)">VIE</button>
        <button class="day-btn" onclick="showDay('Sabado', this)">SAB</button>
    </div>

    <div id="routineList"></div>
</div>

<div class="modal" id="exerciseModal">
    <div class="modal-content">
        <span style="position:absolute; top:15px; right:20px; font-size:30px; cursor:pointer;" onclick="closeModal()">&times;</span>
        
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div id="modalSciatica"></div>
            <div id="sncStatus"></div>
        </div>

        <h2 id="modalTitle" style="text-align:left; margin:10px 0;"></h2>

        <div class="info-section setup-box">
            <strong style="color:#856404; font-size:12px; display:flex; align-items:center; gap:5px;">
                <i class="material-icons" style="font-size:16px;">settings</i> MI SETUP (Toca para editar)
            </strong>
            <input type="text" id="setupInput" class="setup-input" placeholder="Ej: Sillín 4, Respaldo B..." onchange="saveSetup()">
        </div>

        <button class="btn btn-planb" onclick="togglePlanB()">
            <i class="material-icons">block</i> ¡ESTÁ OCUPADA! VER PLAN B
        </button>
        <div id="planBBox" class="info-section" style="display:none; background:#f0f5ff; border-color:#adc6ff;">
            <strong style="color:#2b6cb0;">🚀 Alternativa sugerida:</strong>
            <p id="modalPlanB" style="margin:5px 0; font-weight:bold;"></p>
        </div>

        <div class="video-container" id="modalVideo" style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden; margin:15px 0; border-radius:10px; background:#000;"></div>

        <div class="info-section">
            <strong>Peso actual:</strong> <input type="number" id="weightInput" style="width:60px; padding:5px; border-radius:5px; border:1px solid #ccc;"> kg
            <button onclick="saveWeight()" style="padding:5px 10px; background:var(--primary); color:white; border:none; border-radius:5px;">Guardar</button>
        </div>

        <div id="dynamicContent"></div> <button class="btn btn-main" onclick="closeModal()" style="margin-top:20px;">ENTENDIDO</button>
    </div>
</div>

<script>
// BASE DE DATOS ACTUALIZADA CON TU ORDEN Y PLANES B
const machines = [
    // PIERNAS (Siguiendo tu orden del 1 al 9)
    { id: "prensa_45", nombre: "Prensa Inclinada 45°", grupo: "Pierna", tags: ["Lunes", "Viernes"], prioridad: 1, planB: "Prensa Horizontal", sciatica: "yellow", video: "https://www.youtube.com/embed/wpHk7S4eF5I" },
    { id: "hip_thrust", nombre: "Hip Thrust de Placas", grupo: "Pierna", tags: ["Lunes", "Viernes", "Sabado"], prioridad: 1, planB: "Prensa inclinada (pies altos)", sciatica: "green", video: "https://www.youtube.com/embed/eaU-gdh9BCY" },
    { id: "ext_piernas", nombre: "Extensión de Cuádriceps", grupo: "Pierna", tags: ["Lunes", "Viernes"], prioridad: 2, planB: "Prensa (pies bajos)", sciatica: "green", video: "https://www.youtube.com/embed/J-Y-Z0EU9Ic" },
    { id: "flexion_acostado", nombre: "Flexión de Pierna Acostado", grupo: "Pierna", tags: ["Lunes", "Viernes"], prioridad: 2, planB: "Flexión de pierna sentado", sciatica: "green" },
    { id: "flexion_sentado", nombre: "Flexión de Pierna Sentado", grupo: "Pierna", tags: ["Lunes", "Viernes"], prioridad: 3, planB: "Flexión de pierna acostado", sciatica: "green", video: "https://www.youtube.com/embed/KnVkCUh6of8" },
    { id: "abductores", nombre: "Abductor", grupo: "Pierna", tags: ["Lunes", "Viernes"], prioridad: 3, planB: "Otra unidad de abductor", sciatica: "green", video: "https://www.youtube.com/embed/8G0OHRCESww" },
    { id: "aductores", nombre: "Adductor", grupo: "Pierna", tags: ["Lunes", "Viernes"], prioridad: 3, planB: "Otra unidad de adductor", sciatica: "green" },
    { id: "gemelo_sentado", nombre: "Gemelo Sentado", grupo: "Pierna", tags: ["Lunes", "Viernes"], prioridad: 4, planB: "Puntas en prensa horizontal", sciatica: "green" },
    
    // PECHO (Orden 1 al 4)
    { id: "press_conv_pecho", nombre: "Press Pecho Convergente", grupo: "Pecho", tags: ["Miercoles", "Sabado"], prioridad: 1, planB: "Pec Fly (Aislamiento)", sciatica: "green" },
    { id: "p_declinado", nombre: "Press Declinado (Barra)", grupo: "Pecho", tags: ["Miercoles", "Sabado"], prioridad: 2, planB: "Press plano / Smith", sciatica: "green", video: "https://www.youtube.com/embed/lrkMoax-TSs" },
    { id: "pec_fly", nombre: "Apertura Pectoral (Pec Fly)", grupo: "Pecho", tags: ["Miercoles", "Sabado"], prioridad: 3, planB: "Press de Pecho Convergente", sciatica: "green" },
    
    // CORE
    { id: "crunch_ab", nombre: "Crunch Abdominal", grupo: "Core", tags: ["Lunes", "Miercoles", "Viernes"], prioridad: 4, planB: "Plancha o elevación piernas", sciatica: "green" }
];

let currentId = null;

function showDay(day, btn) {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const container = document.getElementById('routineList');
    
    let html = `<h3>Plan de Hoy: ${day}</h3>`;
    const filtrados = machines.filter(m => m.tags.includes(day));
    
    // Ordenar por prioridad (SNC)
    filtrados.sort((a, b) => a.prioridad - b.prioridad);

    const grupos = [...new Set(filtrados.map(m => m.grupo))];
    grupos.forEach(g => {
        html += `<div class="muscle-header">${g}</div>`;
        filtrados.filter(m => m.grupo === g).forEach(m => {
            const icons = ["battery_full", "battery_6_bar", "battery_3_bar", "battery_alert"];
            html += `
                <button class="btn" style="background:white; border:1px solid #eee; color:#333; text-align:left; display:flex; justify-content:space-between; align-items:center;" onclick="openModal('${m.id}')">
                    <span>${m.nombre}</span>
                    <i class="material-icons" style="color:${getSncColor(m.prioridad)}">${icons[m.prioridad-1]}</i>
                </button>`;
        });
    });
    container.innerHTML = html;
}

function openModal(id) {
    const m = machines.find(x => x.id === id);
    currentId = id;
    document.getElementById('modalTitle').innerText = m.nombre;
    document.getElementById('modalPlanB').innerText = m.planB || "No definido";
    document.getElementById('planBBox').style.display = 'none';
    
    // Cargar Setup y Peso de LocalStorage
    document.getElementById('setupInput').value = localStorage.getItem('setup_' + id) || "";
    document.getElementById('weightInput').value = localStorage.getItem('weight_' + id) || "";

    // Batería SNC
    const icons = ["battery_full", "battery_6_bar", "battery_3_bar", "battery_alert"];
    document.getElementById('sncStatus').innerHTML = `<span style="font-size:11px; font-weight:bold; color:${getSncColor(m.prioridad)}">SNC</span><i class="material-icons battery-icon" style="color:${getSncColor(m.prioridad)}">${icons[m.prioridad-1]}</i>`;

    // Video
    const v = document.getElementById('modalVideo');
    v.innerHTML = m.video ? `<iframe src="${m.video}" style="position:absolute; top:0; left:0; width:100%; height:100%;" frameborder="0" allowfullscreen></iframe>` : "<p style='color:white; text-align:center; padding-top:20%;'>Video próximamente</p>";

    document.getElementById('exerciseModal').classList.add('active');
}

function getSncColor(p) {
    return ["#27ae60", "#f1c40f", "#e67e22", "#e74c3c"][p-1];
}

function saveSetup() {
    localStorage.setItem('setup_' + currentId, document.getElementById('setupInput').value);
}

function saveWeight() {
    localStorage.setItem('weight_' + currentId, document.getElementById('weightInput').value);
    alert("Peso guardado");
}

function togglePlanB() {
    const box = document.getElementById('planBBox');
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

function closeModal() {
    document.getElementById('exerciseModal').classList.remove('active');
    document.getElementById('modalVideo').innerHTML = "";
}

// Iniciar con Lunes por defecto
showDay('Lunes', document.querySelector('.day-btn'));
</script>
</body>
</html>
